        :root {
            --bg-primary: #18191a;
            --bg-secondary: #242526;
            --text-primary: #e4e6eb;
            --text-secondary: #b0b3b8;
            --accent: #1877f2;
            --accent-hover: #166fe5;
            --danger: #e94560;
            --success: #4caf50;
            --border: #3a3b3c;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--bg-primary);
            color: var(--text-primary);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .auth-container {
            width: 100%;
            max-width: 420px;
        }

        .auth-card {
            background: var(--bg-secondary);
            padding: 2rem;
            border-radius: 16px;
            border: 1px solid var(--border);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
        }

        .logo {
            text-align: center;
            font-size: 3rem;
            margin-bottom: 0.5rem;
        }

        .auth-card h2 {
            text-align: center;
            font-size: 1.8rem;
            color: var(--text-primary);
            margin-bottom: 0.3rem;
        }

        .subtitle {
            text-align: center;
            color: var(--text-secondary);
            font-size: 0.95rem;
            margin-bottom: 1.5rem;
        }

        .auth-tabs {
            display: flex;
            gap: 0.5rem;
            background: var(--bg-primary);
            border-radius: 10px;
            padding: 0.3rem;
            margin-bottom: 1.5rem;
        }

        .auth-tab {
            flex: 1;
            padding: 0.6rem;
            border: none;
            background: transparent;
            color: var(--text-secondary);
            cursor: pointer;
            border-radius: 8px;
            font-size: 0.9rem;
            font-weight: 500;
            transition: 0.3s;
        }

        .auth-tab.active {
            background: var(--accent);
            color: white;
        }

        .auth-tab:hover:not(.active) {
            background: rgba(255, 255, 255, 0.05);
        }

        .auth-form {
            display: none;
        }

        .auth-form.active {
            display: block;
        }

        .form-group {
            margin-bottom: 1rem;
        }

        .form-group label {
            display: block;
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin-bottom: 0.3rem;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 0.8rem;
            background: var(--bg-primary);
            border: 1px solid var(--border);
            color: var(--text-primary);
            border-radius: 8px;
            font-size: 0.95rem;
            transition: 0.3s;
        }

        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 2px rgba(24, 119, 242, 0.2);
        }

        .form-group input::placeholder {
            color: var(--text-secondary);
        }

        .form-group select option {
            background: var(--bg-secondary);
            color: var(--text-primary);
        }

        .btn-primary {
            background: var(--accent);
            color: white;
            border: none;
            padding: 0.8rem;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1rem;
            width: 100%;
            transition: 0.3s;
            font-weight: 600;
        }

        .btn-primary:hover:not(:disabled) {
            background: var(--accent-hover);
            transform: scale(1.01);
        }

        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .google-btn {
            background: #ffffff;
            color: #444;
            border: 1px solid #ddd;
            padding: 0.8rem;
            border-radius: 8px;
            font-size: 1rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.8rem;
            width: 100%;
            transition: 0.3s;
            font-weight: 500;
        }

        .google-btn:hover {
            background: #f1f1f1;
            transform: scale(1.01);
        }

        .google-btn svg {
            width: 24px;
            height: 24px;
        }

        .divider {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin: 1.2rem 0;
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border);
        }

        .username-availability {
            font-size: 0.9rem;
            margin-top: 0.3rem;
        }

        .username-available {
            color: var(--success);
        }

        .username-unavailable {
            color: var(--danger);
        }

        .username-hint {
            color: var(--text-secondary);
            font-size: 0.75rem;
            margin-top: 0.2rem;
        }

        .captcha-wrapper {
            background: var(--bg-primary);
            border-radius: 8px;
            padding: 1rem;
            border: 1px solid var(--border);
        }

        .captcha-display {
            background: #0a0a1a;
            padding: 0.8rem;
            text-align: center;
            border-radius: 8px;
            margin-bottom: 0.8rem;
            font-size: 1.5rem;
            font-weight: bold;
            letter-spacing: 5px;
            font-family: monospace;
            border: 2px dashed var(--accent);
            min-height: 60px;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-wrap: wrap;
        }

        .captcha-display span {
            display: inline-block;
            margin: 0 2px;
        }

        .captcha-input-group {
            display: flex;
            gap: 0.8rem;
        }

        .captcha-input-group input {
            flex: 1;
            padding: 0.7rem;
            text-align: center;
            letter-spacing: 2px;
            background: var(--bg-primary);
            border: 1px solid var(--border);
            color: var(--text-primary);
            border-radius: 8px;
            font-size: 0.95rem;
        }

        .captcha-input-group input:focus {
            outline: none;
            border-color: var(--accent);
        }

        .btn-refresh {
            background: var(--accent);
            color: white;
            border: none;
            padding: 0.7rem 1rem;
            border-radius: 8px;
            cursor: pointer;
            white-space: nowrap;
            font-size: 0.9rem;
            transition: 0.3s;
        }

        .btn-refresh:hover {
            background: var(--accent-hover);
        }

        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 0.8s ease-in-out infinite;
            vertical-align: middle;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .auth-footer {
            margin-top: 1.5rem;
            font-size: 0.85rem;
            color: var(--text-secondary);
            text-align: center;
        }

        .forgot-password {
            text-align: right;
            margin-top: 0.3rem;
        }

        .forgot-password a {
            color: var(--text-secondary);
            font-size: 0.85rem;
            text-decoration: none;
            transition: 0.3s;
        }

        .forgot-password a:hover {
            color: var(--accent);
        }

        .privacy-policy-text {
            text-align: center;
            font-size: 0.8rem;
            color: var(--text-secondary);
            margin-top: 0.5rem;
        }

        .privacy-policy-text a {
            color: var(--accent);
            text-decoration: none;
            font-weight: 500;
        }

        .privacy-policy-text a:hover {
            text-decoration: underline;
        }

        .custom-alert {
            position: fixed;
            top: 20px;
            right: 20px;
            left: 20px;
            padding: 12px 16px;
            border-radius: 8px;
            color: white;
            z-index: 10000;
            max-width: 400px;
            margin: 0 auto;
            animation: slideIn 0.3s ease;
            font-size: 0.95rem;
        }

        .custom-alert.success {
            background: var(--success);
        }

        .custom-alert.error {
            background: var(--danger);
        }

        .custom-alert.info {
            background: var(--accent);
        }

        @keyframes slideIn {
            from {
                transform: translateY(-20px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .custom-alert button {
            background: none;
            border: none;
            color: white;
            margin-left: 10px;
            cursor: pointer;
            font-size: 18px;
            float: right;
        }

        @media (max-width: 480px) {
            .auth-card {
                padding: 1.5rem;
            }

            .auth-card h2 {
                font-size: 1.4rem;
            }

            .logo {
                font-size: 2.5rem;
            }

            .google-btn {
                font-size: 0.95rem;
                padding: 0.7rem;
            }

            .captcha-display {
                font-size: 1.2rem;
                min-height: 50px;
            }

            .auth-tab {
                font-size: 0.8rem;
                padding: 0.5rem;
            }

            .form-group input,
            .form-group select {
                font-size: 0.9rem;
                padding: 0.7rem;
            }
        }

        @media (min-width: 481px) and (max-width: 768px) {
            .auth-card {
                padding: 2rem;
            }
        }
    </style>
</head>

                <div class="form-group">
                    <div class="captcha-wrapper">
                        <div class="captcha-display" id="regCaptchaDisplay"></div>
                        <div class="captcha-input-group">
                            <input type="text" id="regCaptchaInput" placeholder="Enter captcha code" autocomplete="off">
                            <button type="button" id="regRefreshCaptcha" class="btn-refresh">⟳</button>
                        </div>
                    </div>
                </div>

                <div class="privacy-policy-text">
                    By creating an account you agree with our
                    <a href="privacy.html">Privacy Policy</a> &amp;
                    <a href="policy.html">Terms of Service</a>
                </div>

                <button id="registerBtn" class="btn-primary" disabled>✅ Create Account</button>
            </div>

            <div class="auth-footer">🔒 Secure Login • Social Media Platform</div>
        </div>
    </div>

    <script>
        // ============================================================
        // SUPABASE CONFIG
        // ============================================================
        const SUPABASE_URL = 'https://mjuowfrzvgnqrazqnunr.supabase.co';
        const SUPABASE_ANON_KEY =
            'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1qdW93ZnJ6dmducXJhenFudW5yIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAwNDY4MzgsImV4cCI6MjA5NTYyMjgzOH0.D9leYQRFsql9ONIsG4pPYdkQdWI_8SDL23wS8rlO7pk';

        let supabaseClient = null;

        function getSupabase() {
            if (!supabaseClient) {
                try {
                    if (typeof window.supabase !== 'undefined' && window.supabase.createClient) {
                        supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
                        console.log("✅ Supabase connected");
                    }
                } catch (e) {
                    console.error("❌ Supabase error:", e);
                }
            }
            return supabaseClient;
        }

        function showAlert(message, type) {
            type = type || 'info';
            const existing = document.querySelector('.custom-alert');
            if (existing) existing.remove();

            const alert = document.createElement('div');
            alert.className = 'custom-alert ' + type;
            alert.innerHTML = message +
                '<button onclick="this.parentElement.remove()">✕</button>';
            document.body.appendChild(alert);
            setTimeout(() => alert.remove(), 4000);
        }

        // ============================================================
        // GENERATE UUID v4 - MODERN VERSION
        // ============================================================
        function generateUUID() {
            // Use crypto.randomUUID() if available
            if (typeof crypto !== 'undefined' && crypto.randomUUID) {
                return crypto.randomUUID();
            }
            
            // Fallback: Manual UUID v4
            return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, function(c) {
                const r = Math.random() * 16 | 0;
                const v = c === 'x' ? r : (r & 0x3 | 0x8);
                return v.toString(16);
            });
        }

        // ============================================================
        // DOM REFERENCES
        // ============================================================
        const loginTab = document.querySelector('[data-tab="login"]');
        const registerTab = document.querySelector('[data-tab="register"]');
        const loginForm = document.getElementById('loginForm');
        const registerForm = document.getElementById('registerForm');

        const loginIdentifier = document.getElementById('loginIdentifier');
        const loginPassword = document.getElementById('loginPassword');
        const loginBtn = document.getElementById('loginBtn');

        const regEmail = document.getElementById('regEmail');
        const regPassword = document.getElementById('regPassword');
        const regUsername = document.getElementById('regUsername');
        const regUsernameStatus = document.getElementById('regUsernameStatus');
        const regCountry = document.getElementById('regCountry');
        const regCaptchaInput = document.getElementById('regCaptchaInput');
        const regCaptchaDisplay = document.getElementById('regCaptchaDisplay');
        const regRefreshCaptcha = document.getElementById('regRefreshCaptcha');
        const registerBtn = document.getElementById('registerBtn');
        const googleSignInBtn = document.getElementById('googleSignInBtn');

        let currentCaptcha = '';
        let isUsernameAvailable = false;

        // ============================================================
        // TABS
        // ============================================================
        loginTab.addEventListener('click', () => {
            loginTab.classList.add('active');
            registerTab.classList.remove('active');
            loginForm.classList.add('active');
            registerForm.classList.remove('active');
        });

        registerTab.addEventListener('click', () => {
            registerTab.classList.add('active');
            loginTab.classList.remove('active');
            registerForm.classList.add('active');
            loginForm.classList.remove('active');
            updateRegCaptcha();
        });

        // ============================================================
        // CAPTCHA
        // ============================================================
        function generateCaptcha() {
            const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ0123456789';
            let captcha = '';
            for (let i = 0; i < 6; i++) {
                captcha += chars.charAt(Math.floor(Math.random() * chars.length));
            }
            return captcha;
        }

        function updateRegCaptcha() {
            currentCaptcha = generateCaptcha();
            regCaptchaDisplay.innerHTML = currentCaptcha.split('').map(char =>
                `<span style="transform:rotate(${Math.random() * 30 - 15}deg); font-size:24px; font-weight:bold; color:hsl(${Math.random() * 360}, 80%, 55%); text-shadow:1px 1px 2px rgba(0,0,0,0.3); font-family:monospace;">${char}</span>`
            ).join('');
        }

        regRefreshCaptcha.addEventListener('click', () => {
            updateRegCaptcha();
            regCaptchaInput.value = '';
        });

        // ============================================================
        // USERNAME AVAILABILITY CHECK
        // ============================================================
        async function checkRegUsernameAvailability(username) {
            if (!username || username.length < 2) {
                regUsernameStatus.innerHTML = '';
                isUsernameAvailable = false;
                registerBtn.disabled = true;
                return;
            }

            const validPattern = /^[A-Za-z0-9]+$/;
            if (!validPattern.test(username)) {
                regUsernameStatus.innerHTML = '❌ Use only English letters and numbers';
                regUsernameStatus.className = 'username-availability username-unavailable';
                isUsernameAvailable = false;
                registerBtn.disabled = true;
                return;
            }

            try {
                const supabase = getSupabase();
                if (!supabase) {
                    regUsernameStatus.innerHTML = '⚠️ Connection issue';
                    return;
                }

                const { data, error } = await supabase
                    .from('users')
                    .select('username')
                    .eq('username', username)
                    .maybeSingle();

                if (error) {
                    console.error('Username check error:', error);
                    regUsernameStatus.innerHTML = '⚠️ Check failed';
                    isUsernameAvailable = false;
                    registerBtn.disabled = true;
                    return;
                }

                if (data) {
                    regUsernameStatus.innerHTML = '❌ Username already taken!';
                    regUsernameStatus.className = 'username-availability username-unavailable';
                    isUsernameAvailable = false;
                    registerBtn.disabled = true;
                } else {
                    regUsernameStatus.innerHTML = '✅ Username available!';
                    regUsernameStatus.className = 'username-availability username-available';
                    isUsernameAvailable = true;
                    checkRegFormValidity();
                }
            } catch (err) {
                console.error('Username check exception:', err);
                regUsernameStatus.innerHTML = '⚠️ Check failed';
                isUsernameAvailable = false;
                registerBtn.disabled = true;
            }
        }

        regUsername.addEventListener('input', () => {
            const val = regUsername.value.trim();
            regUsername.value = val.replace(/[^A-Za-z0-9]/g, '');
            checkRegUsernameAvailability(regUsername.value);
        });

        // ============================================================
        // REGISTER FORM VALIDITY
        // ============================================================
        function checkRegFormValidity() {
            const email = regEmail.value.trim();
            const password = regPassword.value;
            const country = regCountry.value;
            const captcha = regCaptchaInput.value.trim();
            const isCaptchaValid = captcha.toUpperCase() === currentCaptcha.toUpperCase();

            if (email && password.length >= 6 && isUsernameAvailable && country && isCaptchaValid) {
                registerBtn.disabled = false;
            } else {
                registerBtn.disabled = true;
            }
        }

        regEmail.addEventListener('input', checkRegFormValidity);
        regPassword.addEventListener('input', checkRegFormValidity);
        regCountry.addEventListener('change', checkRegFormValidity);
        regCaptchaInput.addEventListener('input', checkRegFormValidity);

        // ============================================================
        // REGISTER - WITH BCRYPT
        // ============================================================
        registerBtn.addEventListener('click', async () => {
            const email = regEmail.value.trim();
            const password = regPassword.value;
            const username = regUsername.value.trim();
            const country = regCountry.value;
            const captcha = regCaptchaInput.value.trim();

            if (!email || !password || !username || !country || !captcha) {
                showAlert('Please fill all fields!', 'error');
                return;
            }

            if (password.length < 6) {
                showAlert('Password must be 6+ characters!', 'error');
                return;
            }

            if (captcha.toUpperCase() !== currentCaptcha.toUpperCase()) {
                showAlert('❌ Invalid captcha!', 'error');
                updateRegCaptcha();
                regCaptchaInput.value = '';
                return;
            }

            registerBtn.innerHTML = '<span class="spinner"></span> Creating account...';
            registerBtn.disabled = true;

            try {
                const supabase = getSupabase();
                if (!supabase) {
                    showAlert('Connection failed!', 'error');
                    registerBtn.innerHTML = '✅ Create Account';
                    registerBtn.disabled = false;
                    return;
                }

                // Check email
                const { data: existingEmail } = await supabase
                    .from('users')
                    .select('email')
                    .eq('email', email)
                    .maybeSingle();

                if (existingEmail) {
                    showAlert('Email already registered!', 'error');
                    registerBtn.innerHTML = '✅ Create Account';
                    registerBtn.disabled = false;
                    return;
                }

                // Hash password
                let hashedPassword = password;
                try {
                    const { data: hashResult, error: hashError } = await supabase
                        .rpc('hash_password', { plain_password: password });

                    if (!hashError && hashResult) {
                        hashedPassword = hashResult;
                        console.log('✅ Password hashed successfully');
                    }
                } catch (hashErr) {
                    console.error('Hash exception:', hashErr);
                }

                // Generate proper UUID
                const userId = generateUUID();
                console.log('🔑 Generated UUID:', userId);

                // Insert user
                const { data: newUser, error } = await supabase
                    .from('users')
                    .insert({
                        id: userId,
                        username: username,
                        email: email,
                        password: hashedPassword,
                        country: country,
                        role: 'user',
                        created_at: new Date().toISOString()
                    })
                    .select()
                    .single();

                if (error) {
                    console.error('Registration error:', error);
                    showAlert('Registration failed: ' + (error.message || 'Unknown error'), 'error');
                    registerBtn.innerHTML = '✅ Create Account';
                    registerBtn.disabled = false;
                    return;
                }

                // Insert into public_users for search
                try {
                    await supabase
                        .from('public_users')
                        .insert({
                            id: userId,
                            username: username,
                            created_at: new Date().toISOString()
                        });
                } catch (pubErr) {
                    console.log('Public users insert skipped:', pubErr);
                }

                localStorage.setItem('userId', newUser.id);
                showAlert('✅ Account created successfully!', 'success');
                setTimeout(() => {
                    window.location.href = 'home.html';
                }, 500);

            } catch (error) {
                console.error('Registration error:', error);
                showAlert('Registration failed!', 'error');
                registerBtn.innerHTML = '✅ Create Account';
                registerBtn.disabled = false;
            }
        });

        // ============================================================
        // LOGIN
        // ============================================================
        loginBtn.addEventListener('click', async () => {
            const identifier = loginIdentifier.value.trim();
            const password = loginPassword.value;

            if (!identifier || !password) {
                showAlert('Please enter email/username and password!', 'error');
                return;
            }

            loginBtn.innerHTML = '<span class="spinner"></span> Logging in...';
            loginBtn.disabled = true;

            try {
                const supabase = getSupabase();
                if (!supabase) {
                    showAlert('Connection failed!', 'error');
                    loginBtn.innerHTML = '🔑 Login';
                    loginBtn.disabled = false;
                    return;
                }

                let email = identifier;
                if (!identifier.includes('@')) {
                    const { data: userData } = await supabase
                        .from('users')
                        .select('email')
                        .eq('username', identifier)
                        .maybeSingle();

                    if (userData) {
                        email = userData.email;
                    } else {
                        showAlert('❌ Username not found!', 'error');
                        loginBtn.innerHTML = '🔑 Login';
                        loginBtn.disabled = false;
                        return;
                    }
                }

                const { data: user, error } = await supabase
                    .from('users')
                    .select('id, username, email, password')
                    .eq('email', email)
                    .maybeSingle();

                if (error || !user) {
                    showAlert('❌ Invalid credentials!', 'error');
                    loginBtn.innerHTML = '🔑 Login';
                    loginBtn.disabled = false;
                    return;
                }

                // Check password
                let passwordMatch = false;

                if (user.password && (user.password.startsWith('$2a$') || user.password.startsWith('$2b$'))) {
                    try {
                        const { data: result } = await supabase
                            .rpc('check_password', {
                                user_id: user.id,
                                plain_password: password
                            });
                        passwordMatch = result || false;
                    } catch (e) {
                        passwordMatch = (user.password === password);
                    }
                } else {
                    passwordMatch = (user.password === password);
                }

                if (!passwordMatch) {
                    showAlert('❌ Invalid credentials!', 'error');
                    loginBtn.innerHTML = '🔑 Login';
                    loginBtn.disabled = false;
                    return;
                }

                localStorage.setItem('userId', user.id);
                showAlert('✅ Login successful!', 'success');
                setTimeout(() => {
                    window.location.href = 'home.html';
                }, 500);

            } catch (error) {
                console.error('Login error:', error);
                showAlert('Login failed!', 'error');
                loginBtn.innerHTML = '🔑 Login';
                loginBtn.disabled = false;
            }
        });

        // ============================================================
        // GOOGLE LOGIN
        // ============================================================
        googleSignInBtn.addEventListener('click', async () => {
            googleSignInBtn.innerHTML = '<span class="spinner"></span> Signing in...';
            googleSignInBtn.disabled = true;

            try {
                if (typeof window.signInWithGoogle !== 'function') {
                    showAlert('Google sign-in is not configured. Please use email/password.', 'error');
                    googleSignInBtn.innerHTML = '<span>Continue with Google</span>';
                    googleSignInBtn.disabled = false;
                    return;
                }

                const user = await window.signInWithGoogle();
                console.log('✅ Google User:', user);

                const supabase = getSupabase();
                if (!supabase) {
                    showAlert('Connection failed!', 'error');
                    googleSignInBtn.innerHTML = '<span>Continue with Google</span>';
                    googleSignInBtn.disabled = false;
                    return;
                }

                const { data: existingUser } = await supabase
                    .from('users')
                    .select('*')
                    .eq('email', user.email)
                    .maybeSingle();

                if (existingUser) {
                    localStorage.setItem('userId', existingUser.id);
                    showAlert('✅ Login successful!', 'success');
                    setTimeout(() => {
                        window.location.href = 'home.html';
                    }, 500);
                } else {
                    registerTab.click();
                    regEmail.value = user.email;
                    regEmail.disabled = true;
                    regUsername.focus();

                    googleSignInBtn.innerHTML = '<span>Continue with Google</span>';
                    googleSignInBtn.disabled = false;

                    showAlert('📝 Please complete registration with your Google email', 'info');
                }
            } catch (error) {
                console.error('Google Sign-In Error:', error);
                showAlert('Google sign-in failed!', 'error');
                googleSignInBtn.innerHTML = '<span>Continue with Google</span>';
                googleSignInBtn.disabled = false;
            }
        });

        // ============================================================
        // ENTER KEY SUPPORT
        // ============================================================
        loginPassword.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') loginBtn.click();
        });

        loginIdentifier.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') loginPassword.focus();
        });

        regCaptchaInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !registerBtn.disabled) registerBtn.click();
        });

        // ============================================================
        // PAGE LOAD
        // ============================================================
        document.addEventListener('DOMContentLoaded', function() {
            console.log('🔧 Login page loaded');
            localStorage.clear();
            sessionStorage.clear();

            const supabase = getSupabase();
            if (supabase) {
                console.log('✅ Supabase connected');
            } else {
                console.error('❌ Supabase connection failed');
            }

            updateRegCaptcha();
        });

        updateRegCaptcha();
        console.log('🚀 Login page ready - Full English + All Countries!');
    </script>
</body>
</html>
