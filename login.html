<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>লগইন - সোশ্যাল মিডিয়া</title>
    
    <!-- Supabase JS -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.0/dist/umd/supabase.min.js"></script>
    
    <!-- Firebase JS (Google Login) -->
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
    
    <link rel="stylesheet" href="css/style.css">
    
    <style>
        /* ===== Login Page Styles ===== */
        .auth-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 1rem;
            background: var(--bg-primary);
        }
        .auth-card {
            background-color: var(--bg-secondary);
            padding: 2.5rem;
            border-radius: 16px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        }
        .auth-card .logo {
            font-size: 3rem;
            text-align: center;
            margin-bottom: 0.5rem;
        }
        .auth-card h2 {
            font-size: 1.8rem;
            text-align: center;
            margin-bottom: 0.5rem;
        }
        .auth-card .subtitle {
            color: var(--text-secondary);
            text-align: center;
            margin-bottom: 2rem;
            font-size: 0.95rem;
        }
        .auth-tabs {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1.5rem;
            background: var(--bg-primary);
            border-radius: 10px;
            padding: 0.3rem;
        }
        .auth-tab {
            flex: 1;
            padding: 0.6rem;
            border: none;
            background: transparent;
            color: var(--text-secondary);
            cursor: pointer;
            border-radius: 8px;
            font-size: 0.9rem;
            font-weight: 500;
            transition: 0.3s;
        }
        .auth-tab.active {
            background: var(--accent);
            color: white;
        }
        .auth-tab:hover:not(.active) {
            background: rgba(255,255,255,0.05);
        }
        .auth-form {
            display: none;
        }
        .auth-form.active {
            display: block;
        }
        .form-group {
            margin-bottom: 1rem;
        }
        .form-group input,
        .form-group select {
            width: 100%;
            padding: 0.8rem;
            background: var(--bg-primary);
            border: 1px solid var(--border);
            color: var(--text-primary);
            border-radius: 8px;
            font-size: 0.95rem;
            box-sizing: border-box;
        }
        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: var(--accent);
        }
        .btn-primary {
            background-color: var(--accent);
            color: white;
            border: none;
            padding: 0.8rem;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1rem;
            width: 100%;
            transition: 0.3s;
            font-weight: 500;
        }
        .btn-primary:hover:not(:disabled) {
            background-color: var(--accent-hover);
            transform: scale(1.02);
        }
        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .btn-secondary {
            background: transparent;
            color: var(--text-primary);
            border: 1px solid var(--border);
            padding: 0.7rem;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.9rem;
            width: 100%;
            transition: 0.3s;
            margin-top: 0.5rem;
        }
        .btn-secondary:hover {
            background: var(--bg-secondary);
        }
        .google-btn {
            background: #fff;
            color: #444;
            border: 1px solid #ddd;
            padding: 0.8rem;
            border-radius: 8px;
            font-size: 1rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.8rem;
            width: 100%;
            transition: 0.3s;
            font-weight: 500;
            margin-top: 1rem;
        }
        .google-btn:hover {
            background: #f1f1f1;
            transform: scale(1.01);
        }
        .google-btn svg {
            width: 24px;
            height: 24px;
        }
        .divider {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin: 1.2rem 0;
            color: var(--text-secondary);
            font-size: 0.9rem;
        }
        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border);
        }
        .username-availability {
            font-size: 0.9rem;
            margin-top: 0.3rem;
        }
        .username-available {
            color: #4caf50;
        }
        .username-unavailable {
            color: #e94560;
        }
        .username-hint {
            color: var(--text-secondary);
            font-size: 0.75rem;
            margin-top: 0.2rem;
        }
        .captcha-wrapper {
            background: var(--bg-primary);
            border-radius: 8px;
            padding: 1rem;
            border: 1px solid var(--border);
        }
        .captcha-display {
            background: #0a0a1a;
            padding: 0.8rem;
            text-align: center;
            border-radius: 8px;
            margin-bottom: 0.8rem;
            font-size: 1.5rem;
            font-weight: bold;
            letter-spacing: 5px;
            font-family: monospace;
            border: 2px dashed var(--accent);
            min-height: 60px;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-wrap: wrap;
        }
        .captcha-display span {
            display: inline-block;
            margin: 0 2px;
        }
        .captcha-input-group {
            display: flex;
            gap: 0.8rem;
        }
        .captcha-input-group input {
            flex: 1;
            padding: 0.7rem;
            text-align: center;
            letter-spacing: 2px;
            background: var(--bg-primary);
            border: 1px solid var(--border);
            color: var(--text-primary);
            border-radius: 8px;
            font-size: 0.95rem;
        }
        .captcha-input-group input:focus {
            outline: none;
            border-color: var(--accent);
        }
        .btn-refresh {
            background-color: var(--accent);
            color: white;
            border: none;
            padding: 0.7rem 1rem;
            border-radius: 8px;
            cursor: pointer;
            white-space: nowrap;
            font-size: 0.9rem;
            transition: 0.3s;
        }
        .btn-refresh:hover {
            background: var(--accent-hover);
        }
        .google-user-info {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 0.8rem;
            background: var(--bg-primary);
            border-radius: 8px;
            margin-bottom: 1rem;
        }
        .google-user-info img {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            object-fit: cover;
        }
        .google-user-info .user-name {
            font-weight: 600;
            font-size: 1rem;
        }
        .google-user-info .user-email {
            color: var(--text-secondary);
            font-size: 0.8rem;
        }
        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 0.8s ease-in-out infinite;
            vertical-align: middle;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .hidden {
            display: none !important;
        }
        .auth-footer {
            margin-top: 1.5rem;
            font-size: 0.85rem;
            color: var(--text-secondary);
            text-align: center;
        }
        .forgot-password {
            text-align: right;
            margin-top: 0.3rem;
        }
        .forgot-password a {
            color: var(--text-secondary);
            font-size: 0.85rem;
            text-decoration: none;
            transition: 0.3s;
        }
        .forgot-password a:hover {
            color: var(--accent);
        }
        .privacy-policy-text {
            text-align: center;
            font-size: 0.8rem;
            color: var(--text-secondary);
            margin-top: 0.5rem;
        }
        .privacy-policy-text a {
            color: var(--accent);
            text-decoration: none;
            font-weight: 500;
            transition: 0.3s;
        }
        .privacy-policy-text a:hover {
            text-decoration: underline;
        }
        @media (max-width: 480px) {
            .auth-card {
                padding: 1.5rem;
            }
            .auth-card h2 {
                font-size: 1.4rem;
            }
            .auth-card .logo {
                font-size: 2.5rem;
            }
            .google-btn {
                font-size: 0.95rem;
                padding: 0.7rem;
            }
            .captcha-display {
                font-size: 1.2rem;
                min-height: 50px;
            }
        }
    </style>
</head>

<body class="dark-theme">
    <div class="auth-container">
        <div class="auth-card">
            <div class="logo">🔐</div>
            <h2>স্বাগতম</h2>
            <p class="subtitle">লগইন বা একাউন্ট তৈরি করুন</p>
            
            <!-- ===== TABS ===== -->
            <div class="auth-tabs">
                <button class="auth-tab active" data-tab="login">🔑 লগইন</button>
                <button class="auth-tab" data-tab="register">📝 রেজিস্ট্রেশন</button>
            </div>
            
            <!-- ===== LOGIN FORM ===== -->
            <div id="loginForm" class="auth-form active">
                <div class="form-group">
                    <input type="email" id="loginEmail" placeholder="ইমেইল" required>
                </div>
                <div class="form-group">
                    <input type="password" id="loginPassword" placeholder="পাসওয়ার্ড" required>
                </div>
                <button id="loginBtn" class="btn-primary">🔑 লগইন</button>
                
                <!-- ✅ নতুন: Forget Password -->
                <div class="forgot-password">
                    <a href="resetpassword.html">🔒 পাসওয়ার্ড ভুলে গেছেন?</a>
                </div>

                <div class="divider">
                    <span>অথবা</span>
                </div>
                
                <button id="googleSignInBtn" class="google-btn">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 48 48">
                        <path fill="#FFC107" d="M43.611,20.083H42V20H24v8h11.303c-1.649,4.657-6.08,8-11.303,8c-6.627,0-12-5.373-12-12c0-6.627,5.373-12,12-12c3.059,0,5.842,1.154,7.961,3.039l5.657-5.657C34.046,6.053,29.268,4,24,4C12.955,4,4,12.955,4,24c0,11.045,8.955,20,20,20c11.045,0,20-8.955,20-20C44,22.659,43.862,21.35,43.611,20.083z"/>
                        <path fill="#FF3D00" d="M6.306,14.691l6.571,4.819C14.655,15.108,18.961,12,24,12c3.059,0,5.842,1.154,7.961,3.039l5.657-5.657C34.046,6.053,29.268,4,24,4C16.318,4,9.656,8.337,6.306,14.691z"/>
                        <path fill="#4CAF50" d="M24,44c5.166,0,9.86-1.977,13.409-5.192l-6.19-5.238C29.211,35.091,26.715,36,24,36c-5.202,0-9.619-3.317-11.283-7.946l-6.522,5.025C9.505,39.556,16.227,44,24,44z"/>
                        <path fill="#1976D2" d="M43.611,20.083H42V20H24v8h11.303c-0.792,2.237-2.231,4.166-4.087,5.571c0.001-0.001,0.002-0.001,0.003-0.002l6.19,5.238C36.971,39.205,44,34,44,24C44,22.659,43.862,21.35,43.611,20.083z"/>
                    </svg>
                    <span>Google দিয়ে লগইন</span>
                </button>
            </div>
            
            <!-- ===== REGISTER FORM ===== -->
            <div id="registerForm" class="auth-form">
                <div class="form-group">
                    <input type="email" id="regEmail" placeholder="ইমেইল *" required>
                </div>
                <div class="form-group">
                    <input type="password" id="regPassword" placeholder="পাসওয়ার্ড (৬+ অক্ষর) *" minlength="6" required>
                </div>
                <div class="form-group">
                    <input type="text" id="regUsername" placeholder="ইউজারনেম (শুধু A-z এবং ০-৯, সর্বোচ্চ ১০ অক্ষর) *" maxlength="10" pattern="[A-Za-z0-9]+" autocomplete="off">
                    <div id="regUsernameStatus" class="username-availability"></div>
                    <div class="username-hint">💡 শুধু ইংরেজি অক্ষর ও সংখ্যা (A-z, 0-9)</div>
                </div>
                <div class="form-group">
                    <select id="regCountry">
                        <option value="">🌍 দেশ নির্বাচন করুন *</option>
                        <option value="বাংলাদেশ">বাংলাদেশ</option>
                        <option value="ভারত">ভারত</option>
                        <option value="পাকিস্তান">পাকিস্তান</option>
                        <option value="আমেরিকা">আমেরিকা</option>
                        <option value="যুক্তরাজ্য">যুক্তরাজ্য</option>
                        <option value="কানাডা">কানাডা</option>
                        <option value="অস্ট্রেলিয়া">অস্ট্রেলিয়া</option>
                    </select>
                </div>
                <div class="form-group">
                    <div class="captcha-wrapper">
                        <div class="captcha-display" id="regCaptchaDisplay"></div>
                        <div class="captcha-input-group">
                            <input type="text" id="regCaptchaInput" placeholder="ক্যাপচা কোড লিখুন *" autocomplete="off">
                            <button type="button" id="regRefreshCaptcha" class="btn-refresh">⟳</button>
                        </div>
                    </div>
                </div>
                
                <!-- ✅ নতুন: Privacy & Policy -->
                <div class="privacy-policy-text">
                    By creating account you agree with our 
                    <a href="privacy.html">Privacy</a> &amp; 
                    <a href="policy.html">Policy</a>
                </div>
                
                <button id="registerBtn" class="btn-primary" disabled>✅ একাউন্ট তৈরি করুন</button>
            </div>
            
            <div class="auth-footer">
                🔒 নিরাপদ লগইন • সোশ্যাল মিডিয়া
            </div>
        </div>
    </div>

    <script src="js/config.js"></script>
    <script src="js/firebase-config.js"></script>
    
    <script>
        // ============================================================
        // COMPLETE LOGIN SYSTEM (Email + Google)
        // ============================================================
        
        // ============================================================
        // DOM REFERENCES
        // ============================================================
        const loginTab = document.querySelector('[data-tab="login"]');
        const registerTab = document.querySelector('[data-tab="register"]');
        const loginForm = document.getElementById('loginForm');
        const registerForm = document.getElementById('registerForm');
        
        const loginEmail = document.getElementById('loginEmail');
        const loginPassword = document.getElementById('loginPassword');
        const loginBtn = document.getElementById('loginBtn');
        
        const regEmail = document.getElementById('regEmail');
        const regPassword = document.getElementById('regPassword');
        const regUsername = document.getElementById('regUsername');
        const regUsernameStatus = document.getElementById('regUsernameStatus');
        const regCountry = document.getElementById('regCountry');
        const regCaptchaInput = document.getElementById('regCaptchaInput');
        const regCaptchaDisplay = document.getElementById('regCaptchaDisplay');
        const regRefreshCaptcha = document.getElementById('regRefreshCaptcha');
        const registerBtn = document.getElementById('registerBtn');
        
        const googleSignInBtn = document.getElementById('googleSignInBtn');
        
        let currentCaptcha = '';
        let isUsernameAvailable = false;
        let googleUser = null;

        // ============================================================
        // TABS
        // ============================================================
        loginTab.addEventListener('click', () => {
            loginTab.classList.add('active');
            registerTab.classList.remove('active');
            loginForm.classList.add('active');
            registerForm.classList.remove('active');
        });
        
        registerTab.addEventListener('click', () => {
            registerTab.classList.add('active');
            loginTab.classList.remove('active');
            registerForm.classList.add('active');
            loginForm.classList.remove('active');
            updateRegCaptcha();
        });

        // ============================================================
        // CAPTCHA
        // ============================================================
        function generateCaptcha() {
            const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ0123456789';
            let captcha = '';
            for (let i = 0; i < 6; i++) {
                captcha += chars.charAt(Math.floor(Math.random() * chars.length));
            }
            return captcha;
        }

        function updateRegCaptcha() {
            currentCaptcha = generateCaptcha();
            regCaptchaDisplay.innerHTML = currentCaptcha.split('').map(char => 
                `<span style="transform:rotate(${Math.random() * 30 - 15}deg); 
                font-size:24px; font-weight:bold; 
                color:hsl(${Math.random() * 360}, 80%, 55%); 
                text-shadow:1px 1px 2px rgba(0,0,0,0.3);
                font-family:monospace;">${char}</span>`
            ).join('');
        }

        regRefreshCaptcha.addEventListener('click', () => {
            updateRegCaptcha();
            regCaptchaInput.value = '';
        });

        // ============================================================
        // USERNAME AVAILABILITY
        // ============================================================
        async function checkRegUsernameAvailability(username) {
            if (!username || username.length < 2) {
                regUsernameStatus.innerHTML = '';
                isUsernameAvailable = false;
                registerBtn.disabled = true;
                return;
            }

            const validPattern = /^[A-Za-z0-9]+$/;
            if (!validPattern.test(username)) {
                regUsernameStatus.innerHTML = '❌ শুধু ইংরেজি অক্ষর ও সংখ্যা ব্যবহার করুন';
                regUsernameStatus.className = 'username-availability username-unavailable';
                isUsernameAvailable = false;
                registerBtn.disabled = true;
                return;
            }

            try {
                const supabase = window.getSupabase();
                if (!supabase) {
                    regUsernameStatus.innerHTML = '⚠️ সংযোগ সমস্যা';
                    return;
                }

                const { data, error } = await supabase
                    .from('users')
                    .select('username')
                    .eq('username', username)
                    .maybeSingle();

                if (error) {
                    console.error('Username check error:', error);
                    regUsernameStatus.innerHTML = '⚠️ চেক করতে সমস্যা';
                    return;
                }

                if (data) {
                    regUsernameStatus.innerHTML = '❌ এই ইউজারনেম নেওয়া হয়েছে!';
                    regUsernameStatus.className = 'username-availability username-unavailable';
                    isUsernameAvailable = false;
                    registerBtn.disabled = true;
                } else {
                    regUsernameStatus.innerHTML = '✅ ইউজারনেম available!';
                    regUsernameStatus.className = 'username-availability username-available';
                    isUsernameAvailable = true;
                    checkRegFormValidity();
                }
            } catch (err) {
                console.error('Username check exception:', err);
                regUsernameStatus.innerHTML = '⚠️ চেক করতে সমস্যা';
            }
        }

        regUsername.addEventListener('input', () => {
            const val = regUsername.value.trim();
            regUsername.value = val.replace(/[^A-Za-z0-9]/g, '');
            checkRegUsernameAvailability(regUsername.value);
        });

        function checkRegFormValidity() {
            const email = regEmail.value.trim();
            const password = regPassword.value;
            const country = regCountry.value;
            const captcha = regCaptchaInput.value.trim();
            const isCaptchaValid = captcha.toUpperCase() === currentCaptcha.toUpperCase();
            
            if (email && password.length >= 6 && isUsernameAvailable && country && isCaptchaValid) {
                registerBtn.disabled = false;
            } else {
                registerBtn.disabled = true;
            }
        }

        regEmail.addEventListener('input', checkRegFormValidity);
        regPassword.addEventListener('input', checkRegFormValidity);
        regCountry.addEventListener('change', checkRegFormValidity);
        regCaptchaInput.addEventListener('input', checkRegFormValidity);

        // ============================================================
        // EMAIL LOGIN
        // ============================================================
        loginBtn.addEventListener('click', async () => {
            const email = loginEmail.value.trim();
            const password = loginPassword.value;

            if (!email || !password) {
                alert('ইমেইল এবং পাসওয়ার্ড দিন!');
                return;
            }

            loginBtn.innerHTML = '<span class="spinner"></span> লগইন হচ্ছে...';
            loginBtn.disabled = true;

            try {
                const supabase = window.getSupabase();
                if (!supabase) {
                    throw new Error('Supabase সংযোগ নেই!');
                }

                const { data: user, error } = await supabase
                    .from('users')
                    .select('*')
                    .eq('email', email)
                    .maybeSingle();

                if (error || !user) {
                    alert('ইমেইল বা পাসওয়ার্ড ভুল!');
                    loginBtn.innerHTML = '🔑 লগইন';
                    loginBtn.disabled = false;
                    return;
                }

                localStorage.setItem('userId', user.id);
                window.location.href = 'home.html';

            } catch (error) {
                console.error('Login error:', error);
                alert('লগইন ব্যর্থ!');
                loginBtn.innerHTML = '🔑 লগইন';
                loginBtn.disabled = false;
            }
        });

        // ============================================================
        // EMAIL REGISTRATION
        // ============================================================
        registerBtn.addEventListener('click', async () => {
            const email = regEmail.value.trim();
            const password = regPassword.value;
            const username = regUsername.value.trim();
            const country = regCountry.value;
            const captcha = regCaptchaInput.value.trim();

            if (!email || !password || !username || !country || !captcha) {
                alert('সব তথ্য পূরণ করুন!');
                return;
            }

            if (password.length < 6) {
                alert('পাসওয়ার্ড ৬+ অক্ষর হতে হবে!');
                return;
            }

            if (captcha.toUpperCase() !== currentCaptcha.toUpperCase()) {
                alert('❌ ক্যাপচা ভুল!');
                updateRegCaptcha();
                regCaptchaInput.value = '';
                return;
            }

            registerBtn.innerHTML = '<span class="spinner"></span> একাউন্ট তৈরি হচ্ছে...';
            registerBtn.disabled = true;

            try {
                const supabase = window.getSupabase();
                if (!supabase) {
                    throw new Error('Supabase সংযোগ নেই!');
                }

                const { data: existingEmail } = await supabase
                    .from('users')
                    .select('email')
                    .eq('email', email)
                    .maybeSingle();

                if (existingEmail) {
                    alert('এই ইমেইল ইতিমধ্যে ব্যবহার করা হয়েছে!');
                    registerBtn.innerHTML = '✅ একাউন্ট তৈরি করুন';
                    registerBtn.disabled = false;
                    return;
                }

                const userId = crypto.randomUUID ? crypto.randomUUID() : Date.now().toString();

                const { data: newUser, error } = await supabase
                    .from('users')
                    .insert({
                        id: userId,
                        username: username,
                        email: email,
                        country: country,
                        role: 'user',
                        created_at: new Date().toISOString()
                    })
                    .select()
                    .single();

                if (error) {
                    console.error('Registration error:', error);
                    alert('একাউন্ট তৈরি ব্যর্থ!');
                    registerBtn.innerHTML = '✅ একাউন্ট তৈরি করুন';
                    registerBtn.disabled = false;
                    return;
                }

                localStorage.setItem('userId', newUser.id);
                window.location.href = 'home.html';

            } catch (error) {
                console.error('Registration error:', error);
                alert('একাউন্ট তৈরি ব্যর্থ!');
                registerBtn.innerHTML = '✅ একাউন্ট তৈরি করুন';
                registerBtn.disabled = false;
            }
        });

        // ============================================================
        // GOOGLE LOGIN
        // ============================================================
        googleSignInBtn.addEventListener('click', async () => {
            googleSignInBtn.innerHTML = '<span class="spinner"></span> লগইন হচ্ছে...';
            googleSignInBtn.disabled = true;

            try {
                const user = await window.signInWithGoogle();
                googleUser = user;
                console.log('✅ Google User:', user);

                const supabase = window.getSupabase();
                if (!supabase) {
                    throw new Error('Supabase not initialized');
                }

                const { data: existingUser, error } = await supabase
                    .from('users')
                    .select('*')
                    .eq('email', user.email)
                    .maybeSingle();

                if (error) {
                    console.error('Supabase query error:', error);
                    alert('ডাটাবেজ চেক করতে সমস্যা!');
                    googleSignInBtn.innerHTML = '<span>Google দিয়ে লগইন</span>';
                    googleSignInBtn.disabled = false;
                    return;
                }

                if (existingUser) {
                    localStorage.setItem('userId', existingUser.id);
                    window.location.href = 'home.html';
                } else {
                    registerTab.click();
                    regEmail.value = user.email;
                    regEmail.disabled = true;
                    regUsername.focus();
                    
                    googleSignInBtn.innerHTML = '<span>Google দিয়ে লগইন</span>';
                    googleSignInBtn.disabled = false;
                    
                    alert('📝 আপনার Google একাউন্ট দিয়ে একাউন্ট তৈরি করতে নিচের ফর্ম পূরণ করুন!');
                }
            } catch (error) {
                console.error('Google Sign-In Error:', error);
                alert('গুগল লগইন ব্যর্থ!');
                googleSignInBtn.innerHTML = '<span>Google দিয়ে লগইন</span>';
                googleSignInBtn.disabled = false;
            }
        });

        // ============================================================
        // PAGE LOAD
        // ============================================================
        document.addEventListener('DOMContentLoaded', function() {
            console.log('🔧 Login page loaded');
            localStorage.clear();
            sessionStorage.clear();
            updateRegCaptcha();
        });

        // ============================================================
        // INITIALIZE
        // ============================================================
        updateRegCaptcha();
        console.log('🚀 Login page ready!');
    </script>
</body>
</html>
