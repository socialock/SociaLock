<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Post</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.0/dist/umd/supabase.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; }
        body { 
            background: #18191a; 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; 
            color: #e4e6eb; 
            display: flex; 
            flex-direction: column; 
        }
        
        /* ===== DARK THEME - FACEBOOK STYLE ===== */
        .post-card { 
            background: #242526; 
            border-radius: 12px; 
            padding: 16px 16px 0; 
            box-shadow: 0 1px 4px rgba(0,0,0,0.3); 
            margin-bottom: 0;
            border: 1px solid #3a3b3c;
        }
        
        .comment-input-wrapper { 
            background: #242526; 
            border-top: 1px solid #3a3b3c; 
            box-shadow: 0 -2px 8px rgba(0,0,0,0.3);
        }
        
        /* ===== POST HEADER ===== */
        .post-header { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; padding-top: 4px; }
        .post-avatar { 
            width: 44px; height: 44px; border-radius: 50%; background: #1877f2; 
            display: flex; align-items: center; justify-content: center; 
            color: white; font-weight: bold; font-size: 20px; flex-shrink: 0; cursor: pointer; 
        }
        .post-user-info { flex: 1; }
        .post-username { 
            font-weight: 700; 
            font-size: 16px; 
            cursor: pointer; 
            display: block; 
            color: #e4e6eb;  /* ← সাদা */
        }
        .post-username:hover { text-decoration: underline; }
        .post-time { 
            font-size: 13px; 
            color: #b0b3b8; 
            display: flex; 
            align-items: center; 
            gap: 4px; 
        }
        
        .post-content { 
            font-size: 16px; 
            line-height: 1.6; 
            margin-bottom: 12px; 
            word-wrap: break-word; 
            white-space: pre-wrap; 
            padding: 0 4px; 
            color: #e4e6eb;
        }
        .post-content a { color: #1877f2; text-decoration: none; }
        .post-content a:hover { text-decoration: underline; }
        
        .post-stats { 
            display: flex; 
            align-items: center; 
            justify-content: space-between; 
            padding: 8px 0; 
            border-top: 1px solid #3a3b3c; 
            border-bottom: 1px solid #3a3b3c; 
            margin-bottom: 4px; 
        }
        .post-stats span { 
            font-size: 14px; 
            color: #b0b3b8; 
            cursor: pointer; 
        }
        .post-stats span:hover { color: #1877f2; }
        
        .post-actions { display: flex; gap: 8px; padding: 4px 0 0; }
        .post-action-btn { 
            flex: 1; display: flex; align-items: center; justify-content: center; 
            gap: 10px; padding: 8px; border: none; background: none; border-radius: 8px; 
            cursor: pointer; font-size: 14px; font-weight: 600; color: #b0b3b8; 
            transition: 0.2s; 
        }
        .post-action-btn:hover { background: #3a3b3c; }
        .post-action-btn.liked { color: #e94560; }
        .post-action-btn svg { width: 20px; height: 20px; }
        
        /* ===== COMMENTS ===== */
        .comments-wrapper { margin-top: 0; padding-top: 0; }
        .comments-list { padding: 4px 0 0; }
        
        .comment-item { 
            display: flex; 
            gap: 12px; 
            padding: 10px 0; 
            border-bottom: 1px solid #3a3b3c; 
        }
        .comment-item:last-child { border-bottom: none; }
        
        .comment-avatar { 
            width: 36px; height: 36px; border-radius: 50%; background: #1877f2; 
            display: flex; align-items: center; justify-content: center; 
            color: white; font-weight: bold; font-size: 15px; flex-shrink: 0; 
            cursor: pointer; margin-top: 2px; 
        }
        .comment-body { flex: 1; min-width: 0; }
        
        .comment-bubble { 
            background: #3a3b3c; 
            border-radius: 18px; 
            padding: 8px 14px; 
            display: inline-block; 
            max-width: 100%; 
        }
        
        .comment-header { 
            display: flex; 
            align-items: center; 
            gap: 8px; 
            margin-bottom: 2px; 
            flex-wrap: wrap; 
        }
        .comment-username { 
            font-weight: 700; 
            font-size: 13px; 
            cursor: pointer; 
            color: #e4e6eb;  /* ← সাদা */
        }
        .comment-username:hover { text-decoration: underline; }
        .comment-time { 
            font-size: 11px; 
            color: #b0b3b8; 
            font-weight: 400; 
        }
        .comment-text { 
            font-size: 15px; 
            line-height: 1.4; 
            word-wrap: break-word; 
            color: #e4e6eb;  /* ← সাদা */
        }
        
        .comment-actions { 
            margin-top: 4px; 
            display: flex; 
            gap: 14px; 
            padding-left: 0; 
            flex-wrap: wrap; 
            align-items: center;
        }
        .comment-action-btn { 
            background: none; border: none; 
            font-size: 12px; color: #b0b3b8; 
            cursor: pointer; padding: 2px 0; 
            transition: 0.2s; font-weight: 500; 
        }
        .comment-action-btn:hover { color: #1877f2; }
        .comment-action-btn.danger:hover { color: #e94560; }
        .comment-reply-btn { 
            background: none; border: none; 
            font-size: 12px; color: #b0b3b8; 
            cursor: pointer; padding: 2px 0; 
            transition: 0.2s; font-weight: 600; 
        }
        .comment-reply-btn:hover { color: #e4e6eb; }
        
        /* ===== REPLIES ===== */
        .replies-container { 
            margin-left: 48px; 
            margin-top: 4px; 
            padding-left: 4px; 
            border-left: 2px solid #3a3b3c; 
            overflow: hidden;
        }
        .replies-container.hidden { display: none; }
        
        .reply-item { 
            display: flex; 
            gap: 12px; 
            padding: 8px 0; 
            border-bottom: 1px solid #3a3b3c; 
        }
        .reply-item:last-child { border-bottom: none; }
        
        .reply-avatar { 
            width: 32px; height: 32px; border-radius: 50%; background: #1877f2; 
            display: flex; align-items: center; justify-content: center; 
            color: white; font-weight: bold; font-size: 13px; flex-shrink: 0; 
            cursor: pointer; margin-top: 2px; 
        }
        .reply-body { flex: 1; min-width: 0; }
        .reply-bubble { 
            background: #3a3b3c; 
            border-radius: 16px; 
            padding: 6px 12px; 
            display: inline-block; 
            max-width: 100%; 
        }
        
        .reply-header { 
            display: flex; 
            align-items: center; 
            gap: 6px; 
            margin-bottom: 2px; 
            flex-wrap: wrap; 
        }
        .reply-username { 
            font-weight: 700; 
            font-size: 12px; 
            cursor: pointer; 
            color: #e4e6eb;  /* ← সাদা */
        }
        .reply-username:hover { text-decoration: underline; }
        .reply-time { font-size: 10px; color: #b0b3b8; }
        .reply-text { 
            font-size: 14px; 
            line-height: 1.4; 
            word-wrap: break-word; 
            color: #e4e6eb;  /* ← সাদা */
        }
        
        .see-replies-btn { 
            background: none; border: none; 
            font-size: 13px; color: #1877f2; 
            cursor: pointer; padding: 6px 0 2px; 
            font-weight: 600; transition: 0.2s; 
            display: inline-block; 
        }
        .see-replies-btn:hover { color: #1a8bf5; text-decoration: underline; }
        
        .view-more-replies { 
            background: none; border: none; 
            font-size: 12px; color: #b0b3b8; 
            cursor: pointer; padding: 4px 0; 
            font-weight: 500; transition: 0.2s; 
            display: block; 
        }
        .view-more-replies:hover { color: #1877f2; }
        
        .no-replies { font-size: 12px; color: #b0b3b8; padding: 4px 0; }
        
        /* ===== COMMENT INPUT - FACEBOOK STYLE ===== */
        .comment-input-wrapper {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: #242526;
            padding: 10px 16px;
            border-top: 1px solid #3a3b3c;
            z-index: 999;
            box-shadow: 0 -2px 8px rgba(0,0,0,0.3);
        }
        
        .comment-input {
            max-width: 700px;
            margin: 0 auto;
            display: flex;
            gap: 12px;
            align-items: center;
            width: 100%;
        }
        .comment-input-avatar { 
            width: 36px; 
            height: 36px; 
            border-radius: 50%; 
            background: #1877f2; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            color: white; 
            font-weight: bold; 
            font-size: 16px; 
            flex-shrink: 0; 
        }
        .comment-input input { 
            flex: 1; 
            padding: 10px 16px; 
            border-radius: 20px; 
            border: none; 
            background: #3a3b3c;  /* ← কালো ব্যাকগ্রাউন্ড */
            color: #e4e6eb;        /* ← সাদা টেক্সট */
            font-size: 15px; 
            outline: none; 
            transition: 0.3s; 
            min-height: 42px;
            width: 100%;
            min-width: 0;
        }
        .comment-input input:focus { 
            border: 1px solid #1877f2; 
            background: #3a3b3c;
        }
        .comment-input input::placeholder { 
            color: #b0b3b8; 
        }
        .comment-input button { 
            padding: 8px 20px; 
            border: none; 
            background: #1877f2; 
            color: white; 
            border-radius: 20px; 
            cursor: pointer; 
            font-weight: 700; 
            font-size: 14px; 
            transition: 0.2s; 
            flex-shrink: 0; 
            min-height: 42px;
            white-space: nowrap;
        }
        .comment-input button:hover { background: #166fe5; }
        .comment-input button:disabled { opacity: 0.5; cursor: not-allowed; }
        
        .view-more-comments { 
            color: #b0b3b8; 
            font-size: 14px; 
            font-weight: 500; 
            cursor: pointer; 
            padding: 12px 0 4px; 
            display: block; 
            text-align: center; 
            transition: 0.2s; 
        }
        .view-more-comments:hover { color: #e4e6eb; }
        .no-comments { 
            text-align: center; 
            padding: 16px 0 4px; 
            color: #b0b3b8; 
            font-size: 14px; 
        }
        .loading-spinner { 
            text-align: center; 
            padding: 20px; 
            color: #b0b3b8; 
            font-size: 14px; 
        }
        
        .back-btn {
            background: none; 
            border: none; 
            font-size: 24px; 
            cursor: pointer; 
            color: #b0b3b8; 
            padding: 4px 0 8px; 
            display: inline-flex; 
            align-items: center; 
            gap: 8px;
            font-weight: 500;
        }
        .back-btn:hover { color: #e4e6eb; }
        
        .main-wrapper { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        .main-container { 
            max-width: 700px; 
            width: 100%; 
            margin: 16px auto 0; 
            padding: 0 16px; 
            flex: 1; 
            overflow-y: auto; 
            padding-bottom: 80px; 
        }
        
        /* ===== RESPONSIVE ===== */
        @media (max-width: 480px) {
            .main-container { margin: 10px auto 12px; padding: 0 10px; padding-bottom: 75px; }
            .post-card { padding: 12px 12px 0; border-radius: 10px; }
            .post-avatar { width: 38px; height: 38px; font-size: 17px; }
            .post-username { font-size: 15px; }
            .post-content { font-size: 15px; }
            .comment-avatar { width: 32px; height: 32px; font-size: 13px; }
            .comment-bubble { padding: 6px 12px; border-radius: 16px; }
            .comment-username { font-size: 12px; }
            .comment-text { font-size: 14px; }
            .comment-time { font-size: 10px; }
            .replies-container { margin-left: 40px; }
            .reply-avatar { width: 28px; height: 28px; font-size: 11px; }
            .reply-bubble { padding: 5px 10px; border-radius: 14px; }
            .reply-username { font-size: 11px; }
            .reply-text { font-size: 13px; }
            .comment-input-wrapper { padding: 8px 10px; }
            .comment-input { gap: 8px; }
            .comment-input input { font-size: 14px; padding: 8px 14px; min-height: 38px; border-radius: 18px; }
            .comment-input button { font-size: 13px; padding: 6px 14px; min-height: 38px; border-radius: 18px; }
            .comment-input-avatar { width: 32px; height: 32px; font-size: 14px; }
            .post-action-btn { font-size: 13px; padding: 6px; }
            .post-action-btn svg { width: 18px; height: 18px; }
        }
    </style>
</head>
<body>
    <div class="main-wrapper">
        <div class="main-container" id="mainContainer">
            <!-- Back Button -->
            <button class="back-btn" onclick="window.location.href='home.html'">← Back</button>
            
            <!-- Post Card -->
            <div class="post-card" id="postContainer">
                <div id="postContent">
                    <div class="loading-spinner">⏳ Loading post...</div>
                </div>
                <div class="comments-wrapper">
                    <div class="comments-list" id="commentsContainer"></div>
                </div>
            </div>
        </div>

        <!-- Comment Input -->
        <div class="comment-input-wrapper">
            <div class="comment-input">
                <div class="comment-input-avatar" id="commentAvatar">U</div>
                <input type="text" id="commentInput" placeholder="Write a comment..." maxlength="200">
                <button id="commentBtn">Post</button>
            </div>
        </div>
    </div>

    <script>
        // ============================================================
        // Supabase Config
        // ============================================================
        const SUPABASE_URL = 'https://mjuowfrzvgnqrazqnunr.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1qdW93ZnJ6dmducXJhenFudW5yIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAwNDY4MzgsImV4cCI6MjA5NTYyMjgzOH0.D9leYQRFsql9ONIsG4pPYdkQdWI_8SDL23wS8rlO7pk';
        
        let supabaseClient = null;
        
        function getSupabase() {
            if (!supabaseClient) {
                try {
                    if (typeof window.supabase !== 'undefined' && window.supabase.createClient) {
                        supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
                        console.log("✅ Supabase connected");
                    }
                } catch (error) {
                    console.error("❌ Supabase error:", error);
                }
            }
            return supabaseClient;
        }
        
        function showAlert(message, type = 'info') {
            const existing = document.querySelector('.custom-alert');
            if (existing) existing.remove();
            
            const alert = document.createElement('div');
            alert.className = 'custom-alert';
            alert.style.cssText = 'position:fixed;top:70px;right:10px;left:10px;padding:12px;border-radius:8px;color:white;z-index:10000;max-width:400px;margin:0 auto;animation:slideIn 0.3s ease;background:' + 
                (type === 'success' ? '#4caf50' : type === 'error' ? '#e94560' : '#0f3460');
            alert.innerHTML = message + '<button onclick="this.parentElement.remove()" style="background:none;border:none;color:white;margin-left:10px;cursor:pointer;font-size:18px;">✕</button>';
            document.body.appendChild(alert);
            setTimeout(() => alert.remove(), 4000);
        }
        
        // ============================================================
        // MAIN CODE
        // ============================================================
        
        let currentUser = null;
        let currentPost = null;
        let allComments = [];
        let commentPage = 0;
        const COMMENTS_PER_PAGE = 10;
        let isLoadingComments = false;
        let hasMoreComments = true;
        let replyingTo = null;
        let replyPages = {};

        document.addEventListener('DOMContentLoaded', async function() {
            const userId = localStorage.getItem('userId');
            if (!userId) {
                window.location.href = 'login.html';
                return;
            }

            const supabase = getSupabase();
            if (!supabase) {
                showAlert('Supabase connection failed!', 'error');
                return;
            }

            const { data: user, error: userError } = await supabase
                .from('users')
                .select('*')
                .eq('id', userId)
                .single();

            if (userError || !user) {
                localStorage.removeItem('userId');
                window.location.href = 'login.html';
                return;
            }

            currentUser = user;
            
            const avatar = document.getElementById('commentAvatar');
            if (avatar) avatar.textContent = user.username.charAt(0).toUpperCase();

            const urlParams = new URLSearchParams(window.location.search);
            const postId = urlParams.get('postId');

            if (!postId) {
                showAlert('Post ID not found!', 'error');
                window.location.href = 'home.html';
                return;
            }

            await loadPost(postId);
            await loadComments(postId);

            const commentInput = document.getElementById('commentInput');
            const commentBtn = document.getElementById('commentBtn');

            commentInput.addEventListener('keydown', function(e) {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    addComment(postId);
                }
            });

            commentBtn.addEventListener('click', function() {
                addComment(postId);
            });

            const mainContainer = document.getElementById('mainContainer');
            mainContainer.addEventListener('scroll', function() {
                if (this.scrollTop + this.clientHeight >= this.scrollHeight - 150) {
                    if (!isLoadingComments && hasMoreComments) {
                        loadMoreComments(postId);
                    }
                }
            });

            commentInput.addEventListener('focus', function() {
                setTimeout(() => {
                    mainContainer.scrollTop = mainContainer.scrollHeight;
                }, 400);
            });
        });

        // ============================================================
        // REPLY FUNCTIONS
        // ============================================================
        function setReplyingTo(commentId, username) {
            replyingTo = { id: commentId, username: username };
            document.getElementById('commentInput').focus();
            document.getElementById('commentInput').placeholder = `Reply to @${username}...`;
            document.querySelectorAll('.comment-reply-btn.replying').forEach(el => el.classList.remove('replying'));
        }

        function cancelReply() {
            replyingTo = null;
            document.getElementById('commentInput').placeholder = 'Write a comment...';
            document.querySelectorAll('.comment-reply-btn.replying').forEach(el => el.classList.remove('replying'));
        }

        // ============================================================
        // LOAD REPLIES
        // ============================================================
        async function loadReplies(commentId) {
            const supabase = getSupabase();
            const container = document.getElementById(`replies-${commentId}`);
            const seeBtn = document.getElementById(`seeReplies-${commentId}`);
            
            if (!container) return;
            
            if (container.classList.contains('loaded')) {
                container.classList.toggle('hidden');
                if (container.classList.contains('hidden')) {
                    seeBtn.textContent = 'See replies';
                } else {
                    seeBtn.textContent = 'Hide replies';
                }
                return;
            }

            container.classList.remove('hidden');
            container.innerHTML = '<div class="loading-spinner" style="padding:8px 0;font-size:12px;">⏳ Loading...</div>';
            container.classList.add('loaded');

            const { data: replies, error } = await supabase
                .from('comments')
                .select('*')
                .eq('parent_comment_id', commentId)
                .order('created_at', { ascending: true })
                .limit(10);

            if (error) {
                container.innerHTML = '<div class="no-replies">❌ Failed to load replies</div>';
                return;
            }

            if (!replies || replies.length === 0) {
                container.innerHTML = '<div class="no-replies">No replies yet</div>';
                return;
            }

            replyPages[commentId] = 1;
            
            container.innerHTML = replies.map(reply => createReplyHTML(reply, commentId)).join('');

            if (replies.length === 10) {
                const moreBtn = document.createElement('button');
                moreBtn.className = 'view-more-replies';
                moreBtn.textContent = 'Load more replies';
                moreBtn.onclick = () => loadMoreReplies(commentId);
                container.appendChild(moreBtn);
            }

            seeBtn.textContent = 'Hide replies';
        }

        async function loadMoreReplies(commentId) {
            const supabase = getSupabase();
            const container = document.getElementById(`replies-${commentId}`);
            const currentPage = replyPages[commentId] || 1;
            const start = currentPage * 10;

            const { data: replies, error } = await supabase
                .from('comments')
                .select('*')
                .eq('parent_comment_id', commentId)
                .order('created_at', { ascending: true })
                .range(start, start + 9);

            if (error || !replies || replies.length === 0) {
                const moreBtn = container.querySelector('.view-more-replies');
                if (moreBtn) moreBtn.remove();
                return;
            }

            replyPages[commentId] = currentPage + 1;
            
            const moreBtn = container.querySelector('.view-more-replies');
            if (moreBtn) moreBtn.remove();

            replies.forEach(reply => {
                container.insertAdjacentHTML('beforeend', createReplyHTML(reply, commentId));
            });

            if (replies.length === 10) {
                const newMoreBtn = document.createElement('button');
                newMoreBtn.className = 'view-more-replies';
                newMoreBtn.textContent = 'Load more replies';
                newMoreBtn.onclick = () => loadMoreReplies(commentId);
                container.appendChild(newMoreBtn);
            }
        }

        // ============================================================
        // REPLY HTML
        // ============================================================
        function createReplyHTML(reply, parentId) {
            const isOwner = currentUser && reply.user_id === currentUser.id;
            const timeAgo = getTimeAgo(reply.created_at);
            const hasReplies = reply.replies_count > 0;
            
            return `
                <div class="reply-item" id="comment-${reply.id}">
                    <div class="reply-avatar" onclick="window.location.href='userprofile.html?userId=${reply.user_id}'">
                        ${(reply.username || 'U').charAt(0).toUpperCase()}
                    </div>
                    <div class="reply-body">
                        <div class="reply-bubble">
                            <div class="reply-header">
                                <span class="reply-username" onclick="window.location.href='userprofile.html?userId=${reply.user_id}'">
                                    ${escapeHtml(reply.username || 'User')}
                                </span>
                                <span class="reply-time">${timeAgo}</span>
                            </div>
                            <div class="reply-text">${escapeHtml(reply.content)}</div>
                        </div>
                        <div class="comment-actions">
                            ${isOwner ? `<button class="comment-action-btn danger" onclick="deleteComment('${reply.id}', '${reply.post_id}')">Delete</button>` : ''}
                            <button class="comment-reply-btn" onclick="setReplyingTo('${reply.id}', '${escapeHtml(reply.username)}')">Reply</button>
                        </div>
                        ${hasReplies ? `<button class="see-replies-btn" id="seeReplies-${reply.id}" onclick="loadReplies('${reply.id}')">${reply.replies_count} replies</button>` : ''}
                        <div class="replies-container hidden" id="replies-${reply.id}"></div>
                    </div>
                </div>
            `;
        }

        // ============================================================
        // LOAD POST
        // ============================================================
        async function loadPost(postId) {
            const supabase = getSupabase();
            const container = document.getElementById('postContent');

            const { data: post, error } = await supabase
                .from('posts')
                .select('*')
                .eq('id', postId)
                .single();

            if (error || !post) {
                container.innerHTML = `<div style="text-align:center;padding:30px;color:#e94560;font-size:18px;">❌ Post not found</div>`;
                return;
            }

            currentPost = post;

            let userLiked = false;
            if (currentUser) {
                const { data: likeData } = await supabase
                    .from('likes')
                    .select('id')
                    .eq('post_id', postId)
                    .eq('user_id', currentUser.id)
                    .maybeSingle();
                userLiked = !!likeData;
            }

            const timeAgo = getTimeAgo(post.created_at);
            let content = post.content || '';
            const urlRegex = /(https?:\/\/[^\s]+)/g;
            content = content.replace(urlRegex, '<a href="$1" target="_blank" rel="noopener noreferrer">$1</a>');

            container.innerHTML = `
                <div class="post-header">
                    <div class="post-avatar" onclick="window.location.href='userprofile.html?userId=${post.user_id}'">
                        ${(post.username || 'U').charAt(0).toUpperCase()}
                    </div>
                    <div class="post-user-info">
                        <span class="post-username" onclick="window.location.href='userprofile.html?userId=${post.user_id}'">
                            ${escapeHtml(post.username || 'User')}
                        </span>
                        <span class="post-time">${timeAgo} · 🌍</span>
                    </div>
                </div>
                <div class="post-content">${content}</div>
                <div class="post-stats">
                    <span>❤️ <span id="likeCount">${post.likes_count || 0}</span></span>
                    <span>💬 <span id="commentCount">${post.comments_count || 0}</span></span>
                </div>
                <div class="post-actions">
                    <button class="post-action-btn ${userLiked ? 'liked' : ''}" onclick="toggleLike('${post.id}')">
                        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
                        <span>Like</span>
                    </button>
                    <button class="post-action-btn" onclick="document.getElementById('commentInput').focus()">
                        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M21 6h-2v9H6v2c0 .55.45 1 1 1h11l4 4V7c0-.55-.45-1-1-1zm-4 6V3c0-.55-.45-1-1-1H3c-.55 0-1 .45-1 1v14l4-4h10c.55 0 1-.45 1-1z"/></svg>
                        <span>Comment</span>
                    </button>
                </div>
            `;
        }

        // ============================================================
        // LOAD COMMENTS
        // ============================================================
        async function loadComments(postId) {
            const supabase = getSupabase();
            const container = document.getElementById('commentsContainer');

            const { data: comments, error } = await supabase
                .from('comments')
                .select('*')
                .eq('post_id', postId)
                .is('parent_comment_id', null)
                .order('created_at', { ascending: false })
                .limit(COMMENTS_PER_PAGE);

            if (error) {
                container.innerHTML = '<div class="no-comments">❌ Failed to load comments</div>';
                return;
            }

            allComments = comments || [];
            commentPage = 1;
            hasMoreComments = allComments.length === COMMENTS_PER_PAGE;

            if (allComments.length === 0) {
                container.innerHTML = '<div class="no-comments">💬 No comments yet. Be the first!</div>';
                return;
            }

            container.innerHTML = allComments.map(comment => createCommentHTML(comment)).join('');

            if (hasMoreComments) {
                const moreBtn = document.createElement('div');
                moreBtn.className = 'view-more-comments';
                moreBtn.textContent = 'Load more comments';
                moreBtn.onclick = () => loadMoreComments(postId);
                container.appendChild(moreBtn);
            }
        }

        async function loadMoreComments(postId) {
            if (isLoadingComments || !hasMoreComments) return;
            isLoadingComments = true;

            const supabase = getSupabase();
            const start = commentPage * COMMENTS_PER_PAGE;

            const { data: comments, error } = await supabase
                .from('comments')
                .select('*')
                .eq('post_id', postId)
                .is('parent_comment_id', null)
                .order('created_at', { ascending: false })
                .range(start, start + COMMENTS_PER_PAGE - 1);

            isLoadingComments = false;

            if (error || !comments || comments.length === 0) {
                hasMoreComments = false;
                const container = document.getElementById('commentsContainer');
                const moreBtn = container.querySelector('.view-more-comments');
                if (moreBtn) moreBtn.remove();
                return;
            }

            allComments = [...allComments, ...comments];
            commentPage++;
            hasMoreComments = comments.length === COMMENTS_PER_PAGE;

            const container = document.getElementById('commentsContainer');
            const moreBtn = container.querySelector('.view-more-comments');
            if (moreBtn) moreBtn.remove();

            comments.forEach(comment => {
                container.insertAdjacentHTML('beforeend', createCommentHTML(comment));
            });

            if (hasMoreComments) {
                const newMoreBtn = document.createElement('div');
                newMoreBtn.className = 'view-more-comments';
                newMoreBtn.textContent = 'Load more comments';
                newMoreBtn.onclick = () => loadMoreComments(postId);
                container.appendChild(newMoreBtn);
            }
        }

        // ============================================================
        // COMMENT HTML
        // ============================================================
        function createCommentHTML(comment) {
            const isOwner = currentUser && comment.user_id === currentUser.id;
            const timeAgo = getTimeAgo(comment.created_at);
            const replyCount = comment.replies_count || 0;
            
            return `
                <div class="comment-item" id="comment-${comment.id}">
                    <div class="comment-avatar" onclick="window.location.href='userprofile.html?userId=${comment.user_id}'">
                        ${(comment.username || 'U').charAt(0).toUpperCase()}
                    </div>
                    <div class="comment-body">
                        <div class="comment-bubble">
                            <div class="comment-header">
                                <span class="comment-username" onclick="window.location.href='userprofile.html?userId=${comment.user_id}'">
                                    ${escapeHtml(comment.username || 'User')}
                                </span>
                                <span class="comment-time">${timeAgo}</span>
                            </div>
                            <div class="comment-text">${escapeHtml(comment.content)}</div>
                        </div>
                        <div class="comment-actions">
                            ${isOwner ? `<button class="comment-action-btn danger" onclick="deleteComment('${comment.id}', '${comment.post_id}')">Delete</button>` : ''}
                            <button class="comment-reply-btn" onclick="setReplyingTo('${comment.id}', '${escapeHtml(comment.username)}')">Reply</button>
                        </div>
                        ${replyCount > 0 ? `<button class="see-replies-btn" id="seeReplies-${comment.id}" onclick="loadReplies('${comment.id}')">${replyCount} replies</button>` : ''}
                        <div class="replies-container hidden" id="replies-${comment.id}"></div>
                    </div>
                </div>
            `;
        }

        // ============================================================
        // ADD COMMENT / REPLY
        // ============================================================
        async function addComment(postId) {
            const input = document.getElementById('commentInput');
            const content = input.value.trim();
            
            if (!content) {
                showAlert('Comment cannot be empty!', 'error');
                return;
            }

            if (content.length > 200) {
                showAlert('Comment cannot exceed 200 characters!', 'error');
                return;
            }

            const supabase = getSupabase();
            const btn = document.getElementById('commentBtn');
            btn.disabled = true;

            const newComment = {
                post_id: postId,
                user_id: currentUser.id,
                username: currentUser.username,
                content: content,
                created_at: new Date().toISOString(),
                parent_comment_id: replyingTo ? replyingTo.id : null,
                replies_count: 0
            };

            const { data, error } = await supabase
                .from('comments')
                .insert(newComment)
                .select();

            btn.disabled = false;

            if (error) {
                showAlert(replyingTo ? 'Failed to reply!' : 'Failed to post comment!', 'error');
                return;
            }

            if (replyingTo) {
                const { count } = await supabase
                    .from('comments')
                    .select('*', { count: 'exact', head: true })
                    .eq('parent_comment_id', replyingTo.id);
                
                await supabase
                    .from('comments')
                    .update({ replies_count: count })
                    .eq('id', replyingTo.id);
                
                const container = document.getElementById(`replies-${replyingTo.id}`);
                if (container) {
                    container.innerHTML = '';
                    container.classList.remove('loaded', 'hidden');
                    await loadReplies(replyingTo.id);
                }
                
                cancelReply();
                showAlert('✅ Reply posted!', 'success');
            } else {
                const { count } = await supabase
                    .from('comments')
                    .select('*', { count: 'exact', head: true })
                    .eq('post_id', postId)
                    .is('parent_comment_id', null);
                
                await supabase.from('posts').update({ comments_count: count }).eq('id', postId);
                document.getElementById('commentCount').textContent = count;

                input.value = '';
                
                allComments = [];
                commentPage = 0;
                hasMoreComments = true;
                await loadComments(postId);
                
                showAlert('✅ Comment posted!', 'success');
            }
            
            const mainContainer = document.getElementById('mainContainer');
            setTimeout(() => {
                mainContainer.scrollTop = mainContainer.scrollHeight;
            }, 100);
        }

        // ============================================================
        // DELETE COMMENT
        // ============================================================
        async function deleteComment(commentId, postId) {
            if (!confirm('Are you sure you want to delete this comment?')) return;

            const supabase = getSupabase();
            
            await supabase.from('comments').delete().eq('parent_comment_id', commentId);
            
            const { error } = await supabase
                .from('comments')
                .delete()
                .eq('id', commentId)
                .eq('user_id', currentUser.id);

            if (error) {
                showAlert('Failed to delete comment!', 'error');
                return;
            }

            const { count } = await supabase
                .from('comments')
                .select('*', { count: 'exact', head: true })
                .eq('post_id', postId)
                .is('parent_comment_id', null);
            
            await supabase.from('posts').update({ comments_count: count }).eq('id', postId);
            document.getElementById('commentCount').textContent = count;

            const commentEl = document.getElementById(`comment-${commentId}`);
            if (commentEl) commentEl.remove();

            showAlert('✅ Comment deleted!', 'success');
        }

        // ============================================================
        // LIKE
        // ============================================================
        async function toggleLike(postId) {
            if (!currentUser) return;

            const supabase = getSupabase();
            const btn = document.querySelector('.post-action-btn[onclick*="toggleLike"]');
            if (!btn) return;
            
            const isLiked = btn.classList.contains('liked');
            const likeCountSpan = document.getElementById('likeCount');
            if (!likeCountSpan) return;
            
            let currentCount = parseInt(likeCountSpan.textContent) || 0;

            if (isLiked) {
                const { error } = await supabase
                    .from('likes')
                    .delete()
                    .eq('post_id', postId)
                    .eq('user_id', currentUser.id);

                if (!error) {
                    btn.classList.remove('liked');
                    const newCount = currentCount - 1;
                    likeCountSpan.textContent = newCount;
                    await supabase.from('posts').update({ likes_count: newCount }).eq('id', postId);
                }
            } else {
                const { error } = await supabase
                    .from('likes')
                    .insert({
                        post_id: postId,
                        user_id: currentUser.id,
                        created_at: new Date().toISOString()
                    });

                if (!error) {
                    btn.classList.add('liked');
                    const newCount = currentCount + 1;
                    likeCountSpan.textContent = newCount;
                    await supabase.from('posts').update({ likes_count: newCount }).eq('id', postId);
                }
            }
        }

        // ============================================================
        // TIME FORMAT
        // ============================================================
        function getTimeAgo(date) {
            if (!date) return 'Just now';
            try {
                const now = new Date();
                const past = new Date(date);
                const diffInSeconds = Math.floor((now - past) / 1000);

                if (diffInSeconds < 5) return 'Just now';
                if (diffInSeconds < 60) return `${diffInSeconds}s ago`;
                const minutes = Math.floor(diffInSeconds / 60);
                if (minutes < 60) return `${minutes}m ago`;
                const hours = Math.floor(minutes / 60);
                if (hours < 24) return `${hours}h ago`;
                const days = Math.floor(hours / 24);
                if (days < 7) return `${days}d ago`;
                const weeks = Math.floor(days / 7);
                if (weeks < 4) return `${weeks}w ago`;
                const months = Math.floor(days / 30);
                if (months < 12) return `${months}mo ago`;
                const years = Math.floor(days / 365);
                return `${years}y ago`;
            } catch (e) {
                return 'Just now';
            }
        }

        // ============================================================
        // UTILITY
        // ============================================================
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        console.log('🚀 Post page loaded - Facebook dark style!');
    </script>
