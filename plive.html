<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Private Live</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.0/dist/umd/supabase.min.js">
    </script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html,
        body {
            height: 100%;
            overflow: hidden;
        }
        body {
            background: #0f0f11;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            color: #e4e6eb;
            display: flex;
            flex-direction: column;
        }

        ::-webkit-scrollbar {
            width: 4px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: #3a3b3c;
            border-radius: 10px;
        }

        /* ===== TOP BAR ===== */
        .top-bar {
            background: #1e1e21;
            padding: 8px 16px;
            border-bottom: 1px solid #2b2b2e;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
            height: 52px;
            z-index: 10;
        }
        .top-bar .back-btn {
            background: none;
            border: none;
            color: #8e8e93;
            font-size: 22px;
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 50%;
            transition: 0.2s;
            width: 38px;
            height: 38px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .top-bar .back-btn:hover {
            background: #2b2b2e;
            color: #e4e6eb;
        }
        .top-bar .title {
            font-size: 16px;
            font-weight: 600;
            color: #e4e6eb;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .top-bar .title i {
            color: #e94560;
            font-size: 14px;
        }
        .top-bar .status {
            font-size: 12px;
            color: #4caf50;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .top-bar .status .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #4caf50;
            display: inline-block;
        }
        .top-bar .status .dot.offline {
            background: #8e8e93;
        }
        .top-bar .status .dot.live {
            background: #e94560;
            animation: pulse 1s infinite;
        }
        @keyframes pulse {
            0%,
            100% {
                opacity: 1;
                transform: scale(1);
            }
            50% {
                opacity: 0.5;
                transform: scale(1.2);
            }
        }

        .main-wrapper {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .main-container {
            max-width: 900px;
            width: 100%;
            margin: 0 auto;
            padding: 0 12px;
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* ===== LOBBY ===== */
        #lobby {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px 0;
        }
        #lobby .lobby-icon {
            font-size: 72px;
            color: #e94560;
            margin-bottom: 16px;
        }
        #lobby h2 {
            font-size: 24px;
            font-weight: 700;
            color: #e4e6eb;
            margin-bottom: 4px;
        }
        #lobby p {
            color: #8e8e93;
            font-size: 14px;
            margin-bottom: 28px;
        }
        .lobby-buttons {
            display: flex;
            gap: 14px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .lobby-btn {
            padding: 12px 32px;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .lobby-btn.go-live {
            background: #e94560;
            color: white;
        }
        .lobby-btn.go-live:hover {
            background: #d43d56;
            transform: scale(1.02);
        }
        .lobby-btn.join-live {
            background: #2b2b2e;
            color: #e4e6eb;
        }
        .lobby-btn.join-live:hover {
            background: #3a3b3c;
            transform: scale(1.02);
        }

        /* ===== MODAL ===== */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            z-index: 3000;
            align-items: center;
            justify-content: center;
            padding: 1rem;
            backdrop-filter: blur(4px);
        }
        .modal-overlay.open {
            display: flex;
        }
        .modal-box {
            background: #1e1e21;
            padding: 28px 24px;
            border-radius: 16px;
            width: 100%;
            max-width: 380px;
            border: 1px solid #2b2b2e;
            animation: modalIn 0.25s ease;
        }
        @keyframes modalIn {
            from {
                transform: scale(0.9) translateY(20px);
                opacity: 0;
            }
            to {
                transform: scale(1) translateY(0);
                opacity: 1;
            }
        }
        .modal-box h3 {
            color: #e4e6eb;
            font-size: 18px;
            margin-bottom: 16px;
            text-align: center;
            font-weight: 600;
        }
        .modal-box h3 i {
            color: #e94560;
            margin-right: 8px;
        }
        .modal-box input {
            width: 100%;
            padding: 12px 16px;
            margin-bottom: 12px;
            background: #2b2b2e;
            border: 1px solid #3a3b3c;
            color: #e4e6eb;
            border-radius: 10px;
            font-size: 14px;
            outline: none;
            transition: 0.2s;
        }
        .modal-box input:focus {
            border-color: #e94560;
        }
        .modal-box input::placeholder {
            color: #8e8e93;
        }
        .modal-box .btn-row {
            display: flex;
            gap: 10px;
        }
        .modal-box .btn-row button {
            flex: 1;
            padding: 11px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: 0.2s;
        }
        .btn-primary-modal {
            background: #e94560;
            color: white;
        }
        .btn-primary-modal:hover {
            background: #d43d56;
        }
        .btn-primary-modal:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .btn-danger-modal {
            background: #2b2b2e;
            color: #e4e6eb;
        }
        .btn-danger-modal:hover {
            background: #3a3b3c;
        }

        /* ===== LIVE ROOM ===== */
        #liveRoom {
            display: none;
            flex: 1;
            flex-direction: column;
            overflow: hidden;
            padding-top: 4px;
        }

        /* ===== LIVE HEADER ===== */
        .live-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 0 10px;
            border-bottom: 1px solid #2b2b2e;
            flex-shrink: 0;
        }
        .live-header .live-info {
            display: flex;
            align-items: center;
            gap: 10px;
            flex: 1;
            min-width: 0;
        }
        .live-header .live-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: #e94560;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 700;
            font-size: 14px;
            flex-shrink: 0;
        }
        .live-header .live-name {
            font-weight: 600;
            font-size: 15px;
            color: #e4e6eb;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .live-header .live-name i {
            color: #e94560;
            margin-right: 4px;
        }
        .live-header .live-viewers {
            font-size: 12px;
            color: #8e8e93;
            white-space: nowrap;
        }
        .live-header .live-viewers i {
            color: #4caf50;
            margin-right: 4px;
        }
        .live-header .live-badge {
            background: #e94560;
            color: white;
            font-size: 10px;
            padding: 2px 10px;
            border-radius: 12px;
            font-weight: 700;
            margin-left: 6px;
            animation: pulse 1.5s infinite;
        }
        .live-header .menu-btn {
            background: none;
            border: none;
            color: #8e8e93;
            font-size: 18px;
            cursor: pointer;
            padding: 6px 10px;
            border-radius: 50%;
            transition: 0.2s;
            position: relative;
            width: 38px;
            height: 38px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .live-header .menu-btn:hover {
            background: #2b2b2e;
            color: #e4e6eb;
        }

        /* ===== VIEWERS DROPDOWN ===== */
        .viewers-dropdown {
            display: none;
            position: absolute;
            right: 0;
            top: 40px;
            background: #1e1e21;
            border-radius: 12px;
            border: 1px solid #2b2b2e;
            min-width: 200px;
            max-width: 260px;
            padding: 6px 0;
            z-index: 100;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.6);
        }
        .viewers-dropdown.show {
            display: block;
        }
        .viewers-dropdown .dropdown-title {
            padding: 8px 16px 10px;
            font-size: 13px;
            font-weight: 600;
            color: #8e8e93;
            border-bottom: 1px solid #2b2b2e;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .viewers-dropdown .dropdown-title .ban-all-btn {
            background: none;
            border: none;
            color: #e94560;
            font-size: 11px;
            cursor: pointer;
            padding: 2px 8px;
            border-radius: 12px;
            transition: 0.2s;
        }
        .viewers-dropdown .dropdown-title .ban-all-btn:hover {
            background: #2b1a1a;
        }
        .viewers-dropdown .viewer-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 16px;
            font-size: 13px;
            color: #e4e6eb;
            border-bottom: 1px solid #2b2b2e;
        }
        .viewers-dropdown .viewer-item:last-child {
            border-bottom: none;
        }
        .viewers-dropdown .viewer-item .avatar {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: #4a9eff;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 700;
            font-size: 11px;
            flex-shrink: 0;
        }
        .viewers-dropdown .viewer-item .name {
            flex: 1;
        }
        .viewers-dropdown .viewer-item .online-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #4caf50;
            flex-shrink: 0;
        }
        .viewers-dropdown .viewer-item .you-tag {
            font-size: 10px;
            color: #8e8e93;
            background: #2b2b2e;
            padding: 1px 8px;
            border-radius: 8px;
        }
        .viewers-dropdown .viewer-item .ban-btn {
            background: none;
            border: none;
            color: #8e8e93;
            font-size: 14px;
            cursor: pointer;
            padding: 2px 6px;
            border-radius: 50%;
            transition: 0.2s;
        }
        .viewers-dropdown .viewer-item .ban-btn:hover {
            color: #e94560;
            background: #2b1a1a;
        }
        .viewers-dropdown .viewer-item.banned {
            opacity: 0.4;
            text-decoration: line-through;
        }
        .viewers-dropdown .viewer-item.banned .ban-btn {
            color: #4caf50;
        }
        .viewers-dropdown .viewer-item.banned .ban-btn:hover {
            color: #4caf50;
            background: #1a2b1a;
        }

        /* ===== LIVE VIDEO AREA ===== */
        .live-video-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #0a0a0c;
            border-radius: 12px;
            margin: 8px 0;
            min-height: 200px;
            position: relative;
            overflow: hidden;
        }
        .live-video-area .video-placeholder {
            text-align: center;
            color: #8e8e93;
        }
        .live-video-area .video-placeholder i {
            font-size: 64px;
            color: #e94560;
            display: block;
            margin-bottom: 12px;
        }
        .live-video-area .video-placeholder .live-text {
            font-size: 14px;
            font-weight: 500;
        }
        .live-video-area .video-placeholder .live-text .pulse-text {
            color: #e94560;
            animation: pulse 1.5s infinite;
        }
        .live-video-area video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 12px;
            background: #0a0a0c;
        }

        /* ===== LIVE TOOLS ===== */
        .live-tools {
            display: flex;
            gap: 8px;
            padding: 6px 0;
            flex-wrap: wrap;
            flex-shrink: 0;
        }
        .live-tools .tool-btn {
            background: #2b2b2e;
            border: none;
            color: #8e8e93;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 12px;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .live-tools .tool-btn:hover {
            background: #3a3b3c;
            color: #e4e6eb;
        }
        .live-tools .tool-btn.active {
            background: #e94560;
            color: white;
        }
        .live-tools .tool-btn i {
            font-size: 14px;
        }
        .live-tools .tool-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        /* ===== COMMENTS ===== */
        .comments-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border-top: 1px solid #2b2b2e;
            padding-top: 6px;
            min-height: 150px;
        }
        .comments-container {
            flex: 1;
            overflow-y: auto;
            padding: 4px 0;
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .comment-item {
            display: flex;
            gap: 8px;
            padding: 4px 8px;
            border-radius: 8px;
            transition: 0.2s;
        }
        .comment-item:hover {
            background: #1a1a1d;
        }
        .comment-item .comment-avatar {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: #4a9eff;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 700;
            font-size: 11px;
            flex-shrink: 0;
            margin-top: 2px;
        }
        .comment-item .comment-body {
            flex: 1;
            min-width: 0;
        }
        .comment-item .comment-username {
            font-weight: 600;
            font-size: 12px;
            color: #e4e6eb;
        }
        .comment-item .comment-username .host-badge {
            background: #e94560;
            color: white;
            font-size: 9px;
            padding: 1px 8px;
            border-radius: 10px;
            margin-left: 4px;
        }
        .comment-item .comment-text {
            font-size: 13px;
            color: #e4e6eb;
            word-wrap: break-word;
        }
        .comment-item .comment-time {
            font-size: 10px;
            color: #8e8e93;
            margin-left: 6px;
        }
        .comment-item .comment-actions {
            display: flex;
            gap: 6px;
            margin-top: 2px;
        }
        .comment-item .comment-actions button {
            background: none;
            border: none;
            color: #8e8e93;
            font-size: 11px;
            cursor: pointer;
            padding: 1px 4px;
            border-radius: 4px;
            transition: 0.2s;
        }
        .comment-item .comment-actions button:hover {
            background: #2b2b2e;
            color: #e4e6eb;
        }
        .comment-item .comment-actions button.danger:hover {
            color: #e94560;
            background: #2b1a1a;
        }

        /* ===== REPLIES ===== */
        .replies-container {
            margin-left: 36px;
            padding-left: 8px;
            border-left: 2px solid #2b2b2e;
        }
        .reply-item {
            display: flex;
            gap: 8px;
            padding: 3px 8px;
            border-radius: 6px;
        }
        .reply-item:hover {
            background: #161618;
        }
        .reply-item .reply-avatar {
            width: 22px;
            height: 22px;
            border-radius: 50%;
            background: #6a6a7a;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 700;
            font-size: 9px;
            flex-shrink: 0;
            margin-top: 2px;
        }
        .reply-item .reply-body {
            flex: 1;
            min-width: 0;
        }
        .reply-item .reply-username {
            font-weight: 600;
            font-size: 11px;
            color: #b0b3b8;
        }
        .reply-item .reply-text {
            font-size: 12px;
            color: #e4e6eb;
            word-wrap: break-word;
        }
        .reply-item .reply-time {
            font-size: 9px;
            color: #8e8e93;
            margin-left: 4px;
        }
        .reply-item .reply-actions button {
            background: none;
            border: none;
            color: #8e8e93;
            font-size: 10px;
            cursor: pointer;
            padding: 1px 4px;
            border-radius: 4px;
            transition: 0.2s;
        }
        .reply-item .reply-actions button:hover {
            background: #2b2b2e;
            color: #e4e6eb;
        }
        .reply-item .reply-actions button.danger:hover {
            color: #e94560;
            background: #2b1a1a;
        }

        .see-replies-btn {
            background: none;
            border: none;
            color: #4a9eff;
            font-size: 11px;
            cursor: pointer;
            padding: 2px 6px;
            border-radius: 4px;
            transition: 0.2s;
        }
        .see-replies-btn:hover {
            background: #1a2a3a;
            text-decoration: underline;
        }

        .no-comments {
            text-align: center;
            color: #8e8e93;
            padding: 20px;
            font-size: 13px;
        }
        .no-comments i {
            display: block;
            font-size: 32px;
            margin-bottom: 8px;
            color: #2b2b2e;
        }

        /* ===== COMMENT INPUT ===== */
        .comment-input-wrapper {
            background: #1e1e21;
            padding: 6px 0 8px;
            border-top: 1px solid #2b2b2e;
            flex-shrink: 0;
        }
        .comment-input {
            display: flex;
            gap: 8px;
            align-items: center;
        }
        .comment-input input[type="text"] {
            flex: 1;
            padding: 8px 14px;
            border-radius: 20px;
            border: none;
            background: #2b2b2e;
            color: #e4e6eb;
            font-size: 13px;
            outline: none;
            min-height: 36px;
            transition: 0.2s;
        }
        .comment-input input[type="text"]:focus {
            background: #333336;
            border: 1px solid #e94560;
        }
        .comment-input input[type="text"]::placeholder {
            color: #8e8e93;
        }
        .comment-input input[type="text"]:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .comment-input button {
            padding: 6px 16px;
            border: none;
            background: #e94560;
            color: white;
            border-radius: 20px;
            cursor: pointer;
            font-weight: 600;
            font-size: 13px;
            transition: 0.2s;
            min-height: 36px;
        }
        .comment-input button:hover {
            background: #d43d56;
        }
        .comment-input button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .custom-alert {
            position: fixed;
            top: 70px;
            right: 10px;
            left: 10px;
            padding: 12px 16px;
            border-radius: 12px;
            color: white;
            z-index: 10000;
            max-width: 400px;
            margin: 0 auto;
            animation: slideIn 0.3s ease;
            font-size: 14px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
        }
        .custom-alert.success {
            background: #2b7a3a;
        }
        .custom-alert.error {
            background: #b33a3a;
        }
        .custom-alert.info {
            background: #1a4a7a;
        }
        @keyframes slideIn {
            from {
                transform: translateY(-20px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }
        .custom-alert button {
            background: none;
            border: none;
            color: white;
            margin-left: 10px;
            cursor: pointer;
            font-size: 18px;
            float: right;
            opacity: 0.7;
        }
        .custom-alert button:hover {
            opacity: 1;
        }

        .confirm-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.75);
            z-index: 9999;
            align-items: center;
            justify-content: center;
            padding: 1rem;
            backdrop-filter: blur(6px);
        }
        .confirm-overlay.open {
            display: flex;
        }
        .confirm-box {
            background: #1e1e21;
            padding: 28px 24px;
            border-radius: 16px;
            width: 100%;
            max-width: 360px;
            border: 1px solid #2b2b2e;
            animation: modalIn 0.25s ease;
            text-align: center;
        }
        .confirm-box .icon {
            font-size: 48px;
            color: #f5a623;
            margin-bottom: 12px;
        }
        .confirm-box h3 {
            color: #e4e6eb;
            font-size: 18px;
            margin-bottom: 6px;
        }
        .confirm-box p {
            color: #8e8e93;
            font-size: 14px;
            margin-bottom: 20px;
        }
        .confirm-box .btn-row {
            display: flex;
            gap: 10px;
        }
        .confirm-box .btn-row button {

        // ============================================================

        // ============================================================
        // GO LIVE

        document.getElementById('goLiveBtn').addEventListener('click', async function() {

            const roomId = roomName + '_' + btoa(password).substring(0, 8);

            // Check if room already active
            if (isRoomActive(roomId)) {
                showAlert('❌ This live stream is already active!', 'error');
                return;
            }

            this.disabled = true;

            try {

                // Get camera & mic
                try {

                    });

        // ============================================================
        // PEERJS INIT
        // ============================================================
        async function initializePeer(roomId, password, create) {
            return new Promise((resolve, reject) => {
                try {
                    if (typeof Peer === 'undefined') {
                        const script = document.createElement('script');
                        script.src = 'https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js';
                        script.onload = () => {
                            setupPeerJS(roomId, password, create, resolve, reject);
                        };
                        script.onerror = () => {
                            reject(new Error('PeerJS failed to load'));
                        };
                        document.head.appendChild(script);
                    } else {
                        setupPeerJS(roomId, password, create, resolve, reject);
                    }
                } catch (err) {
                    reject(err);
                }
            });
        }

        function setupPeerJS(roomId, password, create, resolve, reject) {
            try {
                const userId = localStorage.getItem('userId');
                let username = 'User';

                if (userId) {
                    getSupabase().from('users').select('username').eq('id', userId).single()
                        .then(({ data }) => {
                            username = data?.username || 'User';
                            createPeer(roomId, password, create, username, resolve, reject);
                        }).catch(() => {
                            createPeer(roomId, password, create, username, resolve, reject);
                        });
                } else {
                    createPeer(roomId, password, create, username, resolve, reject);
                }
            } catch (err) {
                reject(err);
            }
        }

        function createPeer(roomId, password, create, username, resolve, reject) {
            myPeerId = generateId() + '-' + Date.now();

            peer = new Peer(myPeerId, {
                debug: 1,
                config: {
                    iceServers: [
                        { urls: 'stun:stun.l.google.com:19302' },
                        { urls: 'stun:stun1.l.google.com:19302' },
                        { urls: 'stun:stun2.l.google.com:19302' }
                    ]
                }
            });

            peer.on('open', (id) => {
                console.log('✅ Peer connected:', id);
                setStatus(true, 'Connected');

                window.roomId = roomId;
                window.password = password;
                window.username = username;

                if (create) {
                    setTimeout(() => {
                        broadcastPresence(username);
                    }, 500);
                } else {
                    findHost(roomId, username);
                }

                resolve();
            });

            peer.on('connection', (conn) => {
                handleConnection(conn, username);
            });

            peer.on('call', (call) => {
                handleIncomingCall(call);
            });

            peer.on('error', (err) => {
                console.error('Peer error:', err);
                if (err.type === 'peer-unavailable') {
                    showAlert('No live stream found!', 'error');
                }
                setStatus(false, 'Error');
            });

            peer.on('disconnected', () => {
                setStatus(false, 'Disconnected');
                showAlert('Disconnected from network!', 'error');
            });

            setTimeout(() => {
                if (!peer || !peer.id) {
                    reject(new Error('Peer connection timeout'));
                }
            }, 15000);
        }

        function setStatus(online, text) {
            if (online) {
                statusDot.className = 'dot';
                statusText.textContent = text || 'Connected';
            } else {
                statusDot.className = 'dot offline';
                statusText.textContent = text || 'Offline';
            }
        }

        // ============================================================
        // FIND HOST
        // ============================================================
        function findHost(roomId, username) {
            if (!supabase) {
                showAlert('Signaling server not available!', 'error');
                return;
            }

            if (signalChannel) {
                signalChannel.unsubscribe();
            }

            signalChannel = supabase.channel('live-signal-' + roomId);

            signalChannel.on('broadcast', { event: 'host-announce' }, ({ payload }) => {
                if (payload.peerId !== myPeerId && !connections[payload.peerId]) {
                    console.log('Found host:', payload.peerId);
                    connectToPeer(payload.peerId, username);
                    // Request video
                    setTimeout(() => {
                        if (connections[payload.peerId]) {
                            connections[payload.peerId].send({
                                type: 'request-video'
                            });
                        }
                    }, 1000);
                }
            });

            signalChannel.on('broadcast', { event: 'viewer-join' }, ({ payload }) => {
                if (payload.peerId !== myPeerId && !connections[payload.peerId] && isHost) {
                    console.log('New viewer joined:', payload.peerId);
                    connectToPeer(payload.peerId, username);
                }
            });

            signalChannel.on('broadcast', { event: 'host-offline' }, ({ payload }) => {
                if (!isHost) {
                    showAlert('❌ Host ended the live stream.', 'info');
                    leaveRoom();
                }
            });

            signalChannel.subscribe((status) => {
                if (status === 'SUBSCRIBED') {
                    signalChannel.send({
                        type: 'broadcast',
                        event: 'viewer-join',
                        payload: { peerId: myPeerId, username: username }
                    });

                    setTimeout(() => {
                        signalChannel.send({
                            type: 'broadcast',
                            event: 'viewer-request',
                            payload: { peerId: myPeerId, username: username }
                        });
                    }, 500);
                }
            });

            // Check if host is online periodically
            window.announceInterval = setInterval(() => {
                if (signalChannel && !isHost) {
                    signalChannel.send({
                        type: 'broadcast',
                        event: 'viewer-request',
                        payload: { peerId: myPeerId, username: username }
                    });
                }
            }, 10000);
        }

        // ============================================================
        // BROADCAST PRESENCE (Host)
        // ============================================================
        function broadcastPresence(username) {
            if (!supabase) return;

            if (signalChannel) {
                signalChannel.unsubscribe();
            }

            signalChannel = supabase.channel('live-signal-' + window.roomId);

            signalChannel.on('broadcast', { event: 'viewer-join' }, ({ payload }) => {
                if (payload.peerId !== myPeerId && !connections[payload.peerId]) {
                    console.log('New viewer joined:', payload.peerId);
                    // Check if viewer is banned
                    if (isUserBanned(payload.peerId)) {
                        showAlert('🚫 Banned user tried to join: ' + payload.username, 'info');
                        return;
                    }
                    connectToPeer(payload.peerId, username);
                    // Send video stream
                    setTimeout(() => {
                        if (localStream && connections[payload.peerId]) {
                            const call = peer.call(payload.peerId, localStream);
                            call.on('stream', (stream) => {
                                // Remote viewer's stream (if they have camera)
                            });
                        }
                    }, 1000);
                }
            });

            signalChannel.on('broadcast', { event: 'viewer-request' }, ({ payload }) => {
                if (payload.peerId !== myPeerId && !connections[payload.peerId]) {
                    signalChannel.send({
                        type: 'broadcast',
                        event: 'host-announce',
                        payload: { peerId: myPeerId, username: username }
                    });
                }
            });

            signalChannel.subscribe((status) => {
                if (status === 'SUBSCRIBED') {
                    signalChannel.send({
                        type: 'broadcast',
                        event: 'host-announce',
                        payload: { peerId: myPeerId, username: username }
                    });
                }
            });

            // Keep announcing
            window.announceInterval = setInterval(() => {
                if (signalChannel) {
                    signalChannel.send({
                        type: 'broadcast',
                        event: 'host-announce',
                        payload: { peerId: myPeerId, username: username }
                    });
                }
            }, 10000);
        }

        // ============================================================
        // CONNECT TO PEER
        // ============================================================
        function connectToPeer(peerId, username) {
            if (connections[peerId]) return;
            if (peerId === myPeerId) return;

            console.log('Connecting to peer:', peerId);

            try {
                const conn = peer.connect(peerId, {
                    reliable: true,
                    metadata: { username: username }
                });

                conn.on('open', () => {
                    console.log('✅ Connected to peer:', peerId);
                    connections[peerId] = conn;
                    peers[peerId] = conn;
                    viewerNames[peerId] = conn.metadata?.username || 'User';
                    updateViewersList();

                    conn.send({
                        type: 'presence',
                        username: currentUser?.username || 'User',
                        isHost: isHost
                    });

                    conn.on('data', (data) => {
                        handleIncomingData(data, peerId);
                    });

                    conn.on('close', () => {
                        console.log('❌ Peer disconnected:', peerId);
                        delete connections[peerId];
                        delete peers[peerId];
                        updateViewersList();
                        if (!isHost) {
                            showAlert('👋 Host left the stream', 'info');
                            leaveRoom();
                        }
                    });
                });

                conn.on('error', (err) => {
                    console.error('Connection error:', err);
                });

            } catch (err) {
                console.error('Connect error:', err);
            }
        }

        // ============================================================
        // HANDLE INCOMING CONNECTION
        // ============================================================
        function handleConnection(conn, username) {
            const peerId = conn.peer;

            conn.on('open', () => {
                console.log('✅ Incoming connection from:', peerId);

                if (isUserBanned(peerId)) {
                    conn.send({ type: 'banned' });
                    conn.close();
                    return;
                }

                connections[peerId] = conn;
                peers[peerId] = conn;
                viewerNames[peerId] = conn.metadata?.username || 'User';
                updateViewersList();

                conn.on('data', (data) => {
                    handleIncomingData(data, peerId);
                });

                conn.on('close', () => {
                    console.log('❌ Peer disconnected:', peerId);
                    delete connections[peerId];
                    delete peers[peerId];
                    updateViewersList();
                });
            });

            conn.on('error', (err) => {
                console.error('Connection error:', err);
            });
        }

        // ============================================================
        // HANDLE INCOMING CALL (Video)
        // ============================================================
        function handleIncomingCall(call) {
            call.answer(localStream || null);
            call.on('stream', (stream) => {
                if (!isHost) {
                    remoteVideo.srcObject = stream;
                    remoteVideo.style.display = 'block';
                    videoPlaceholder.style.display = 'none';
                    streamStatus.textContent = '📺 Watching live stream';
                }
            });
        }

        // ============================================================
        // HANDLE INCOMING DATA
        // ============================================================
        function handleIncomingData(data, peerId) {
            if (!data) return;

            try {
                if (data.type === 'comment') {
                    if (isUserBanned(data.userId)) {
                        // Ignore banned user's comments
                        return;
                    }
                    appendComment(data.username, data.content, data.userId, data.timestamp);
                } else if (data.type === 'reply') {
                    if (isUserBanned(data.userId)) {
                        return;
                    }
                    appendReply(data.commentId, data.username, data.content, data.userId, data.timestamp);
                } else if (data.type === 'presence') {
                    viewerNames[peerId] = data.username || 'User';
                    updateViewersList();
                } else if (data.type === 'request-video' && isHost) {
                    // Send video stream to viewer
                    if (localStream && connections[peerId]) {
                        const call = peer.call(peerId, localStream);
                        call.on('stream', (stream) => {});
                    }
                } else if (data.type === 'banned') {
                    showAlert('🚫 You have been banned from this stream!', 'error');
                    leaveRoom();
                } else if (data.type === 'ban-user' && isHost) {
                    banUser(data.userId, data.username);
                } else if (data.type === 'unban-user' && isHost) {
                    unbanUser(data.userId, data.username);
                } else if (data.type === 'host-ended') {
                    if (!isHost) {
                        showAlert('❌ Host ended the live stream.', 'info');
                        leaveRoom();
                    }
                }
            } catch (err) {
                console.error('Data handling error:', err);
            }
        }

        // ============================================================
        // ENTER LIVE ROOM
        // ============================================================
        function enterLiveRoom(roomName, roomId, create) {
            lobby.style.display = 'none';
            liveRoom.style.display = 'flex';
            liveNameDisplay.innerHTML = '<i class="fas fa-broadcast-tower"></i> ' + escapeHtml(roomName);
            liveAvatar.textContent = roomName.charAt(0).toUpperCase();
            isInRoom = true;
            isLeaving = false;

            if (create) {
                liveTools.style.display = 'flex';
                endLiveBtn.style.display = 'flex';
                banAllBtn.style.display = 'block';
                streamStatus.textContent = '🟢 Live now!';
                liveBadge.textContent = '● LIVE';
                statusDot.className = 'dot live';
            } else {
                liveTools.style.display = 'none';
                endLiveBtn.style.display = 'none';
                banAllBtn.style.display = 'none';
                streamStatus.textContent = '📺 Watching live stream...';
                liveBadge.textContent = '● WATCHING';
                statusDot.className = 'dot';
            }

            setTimeout(() => {
                broadcastToAll({
                    type: 'presence',
                    username: currentUser?.username || 'User',
                    isHost: isHost
                });
            }, 1000);

            commentInput.focus();
            updateViewersList();

            commentInput.addEventListener('keydown', (e) => {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    sendComment();
                }
            });

            sendCommentBtn.addEventListener('click', sendComment);

            backBtn.addEventListener('click', handleBackClick);
            window.addEventListener('beforeunload', handleBeforeUnload);
        }

        // ============================================================
        // SEND COMMENT
        // ============================================================
        function sendComment() {
            const content = commentInput.value.trim();
            if (!content) return;

            if (isUserBanned(currentUser?.id)) {
                showAlert('🚫 You are banned from this stream!', 'error');
                return;
            }

            const commentData = {
                type: 'comment',
                content: content,
                username: currentUser?.username || 'You',
                userId: currentUser?.id || 'unknown',
                timestamp: Date.now()
            };

            appendComment(commentData.username, content, commentData.userId, Date.now());
            broadcastToAll(commentData);

            commentInput.value = '';
            commentInput.focus();
        }

        // ============================================================
        // APPEND COMMENT
        // ============================================================
        function appendComment(username, content, userId, timestamp) {
            const noMsg = commentsContainer.querySelector('.no-comments');
            if (noMsg) noMsg.remove();

            const div = document.createElement('div');
            div.className = 'comment-item';
            div.id = 'comment-' + timestamp;

            const time = getTime();
            const isHostUser = isHost && userId === currentUser?.id;

            div.innerHTML = `
                <div class="comment-avatar">${username.charAt(0).toUpperCase()}</div>
                <div class="comment-body">
                    <div>
                        <span class="comment-username">
                            ${escapeHtml(username)}
                            ${isHostUser ? `<span class="host-badge">HOST</span>` : ''}
                        </span>
                        <span class="comment-time">${time}</span>
                    </div>
                    <div class="comment-text">${escapeHtml(content)}</div>
                    <div class="comment-actions">
                        <button onclick="replyToComment('${timestamp}', '${escapeHtml(username)}')">Reply</button>
                        ${isHost && userId !== currentUser?.id ? `<button class="danger" onclick="banUserFromComment('${userId}', '${escapeHtml(username)}')">Ban</button>` : ''}
                    </div>
                    <div class="replies-container" id="replies-${timestamp}"></div>
                </div>
            `;

            commentsContainer.appendChild(div);
            commentsContainer.scrollTop = commentsContainer.scrollHeight;
        }

        // ============================================================
        // REPLY TO COMMENT
        // ============================================================
        let replyingTo = null;

        function replyToComment(commentId, username) {
            replyingTo = { id: commentId, username: username };
            commentInput.placeholder = 'Reply to @' + username + '...';
            commentInput.focus();
        }

        function cancelReply() {
            replyingTo = null;
            commentInput.placeholder = 'Write a comment...';
        }

        // Override sendComment to handle replies
        const originalSendComment = sendComment;
        sendComment = function() {
            const content = commentInput.value.trim();
            if (!content) return;

            if (isUserBanned(currentUser?.id)) {
                showAlert('🚫 You are banned from this stream!', 'error');
                return;
            }

            if (replyingTo) {
                const replyData = {
                    type: 'reply',
                    commentId: replyingTo.id,
                    content: content,
                    username: currentUser?.username || 'You',
                    userId: currentUser?.id || 'unknown',
                    timestamp: Date.now()
                };

                appendReply(replyingTo.id, replyData.username, content, replyData.userId, Date.now());
                broadcastToAll(replyData);
                cancelReply();
            } else {
                const commentData = {
                    type: 'comment',
                    content: content,
                    username: currentUser?.username || 'You',
                    userId: currentUser?.id || 'unknown',
                    timestamp: Date.now()
                };

                appendComment(commentData.username, content, commentData.userId, Date.now());
                broadcastToAll(commentData);
            }

            commentInput.value = '';
            commentInput.focus();
        };

        // ============================================================
        // APPEND REPLY
        // ============================================================
        function appendReply(commentId, username, content, userId, timestamp) {
            const container = document.getElementById('replies-' + commentId);
            if (!container) return;

            const div = document.createElement('div');
            div.className = 'reply-item';

            const time = getTime();

            div.innerHTML = `
                <div class="reply-avatar">${username.charAt(0).toUpperCase()}</div>
                <div class="reply-body">
                    <div>
                        <span class="reply-username">${escapeHtml(username)}</span>
                        <span class="reply-time">${time}</span>
                    </div>
                    <div class="reply-text">${escapeHtml(content)}</div>
                    <div class="reply-actions">
                        ${isHost && userId !== currentUser?.id ? `<button class="danger" onclick="banUserFromComment('${userId}', '${escapeHtml(username)}')">Ban</button>` : ''}
                    </div>
                </div>
            `;

            container.appendChild(div);
            commentsContainer.scrollTop = commentsContainer.scrollHeight;
        }

        // ============================================================
        // BAN USER FROM COMMENT
        // ============================================================
        function banUserFromComment(userId, username) {
            if (!isHost) return;
            banUser(userId, username);
            broadcastToAll({
                type: 'ban-user',
                userId: userId,
                username: username
            });
            updateViewersList();
        }

        // ============================================================
        // VIEWERS LIST
        // ============================================================
        function updateViewersList() {
            const count = Object.keys(connections).length + 1;
            viewerCount.textContent = count;

            const list = document.getElementById('viewersList');
            const myUsername = currentUser?.username || 'You';

            let html = '';
            html += `
                <div class="viewer-item">
                    <div class="avatar">${myUsername.charAt(0).toUpperCase()}</div>
                    <div class="name">${escapeHtml(myUsername)} ${isHost ? '👑' : ''}</div>
                    <div class="online-dot"></div>
                    <span class="you-tag">You</span>
                </div>
            `;

            for (const [peerId, conn] of Object.entries(connections)) {
                const name = viewerNames[peerId] || 'User';
                const banned = isUserBanned(peerId);
                html += `
                    <div class="viewer-item ${banned ? 'banned' : ''}">
                        <div class="avatar">${name.charAt(0).toUpperCase()}</div>
                        <div class="name">${escapeHtml(name)}</div>
                        <div class="online-dot"></div>
                        ${isHost && peerId !== myPeerId ? `
                            ${banned ? 
                                `<button class="ban-btn" onclick="unbanUserFromList('${peerId}', '${escapeHtml(name)}')" title="Unban"><i class="fas fa-check"></i></button>` :
                                `<button class="ban-btn" onclick="banUserFromList('${peerId}', '${escapeHtml(name)}')" title="Ban"><i class="fas fa-ban"></i></button>`
                            }
                        ` : ''}
                    </div>
                `;
            }

            list.innerHTML = html;
        }

        function banUserFromList(userId, username) {
            banUser(userId, username);
            broadcastToAll({
                type: 'ban-user',
                userId: userId,
                username: username
            });
            updateViewersList();
        }

        function unbanUserFromList(userId, username) {
            unbanUser(userId, username);
            broadcastToAll({
                type: 'unban-user',
                userId: userId,
                username: username
            });
            updateViewersList();
        }

        function toggleViewersDropdown() {
            viewersDropdown.classList.toggle('show');
        }

        document.addEventListener('click', (e) => {
            if (!e.target.closest('.menu-btn') && !e.target.closest('.viewers-dropdown')) {
                viewersDropdown.classList.remove('show');
            }
        });

        // ============================================================
        // LIVE TOOLS
        // ============================================================
        function toggleMic() {
            if (!localStream) return;
            isMicOn = !isMicOn;
            localStream.getAudioTracks().forEach(track => track.enabled = isMicOn);
            document.getElementById('micBtn').classList.toggle('active');
            document.getElementById('micBtn').innerHTML = `<i class="fas fa-microphone${isMicOn ? '' : '-slash'}"></i> Mic`;
            showAlert(isMicOn ? '🎤 Mic on' : '🔇 Mic off', 'info');
        }

        function toggleCamera() {
            if (!localStream) return;
            isCameraOn = !isCameraOn;
            localStream.getVideoTracks().forEach(track => track.enabled = isCameraOn);
            document.getElementById('cameraBtn').classList.toggle('active');
            document.getElementById('cameraBtn').innerHTML = `<i class="fas fa-video${isCameraOn ? '' : '-slash'}"></i> Camera`;
            showAlert(isCameraOn ? '📷 Camera on' : '📷 Camera off', 'info');
        }

        async function toggleScreenShare() {
            if (!isHost) {
                showAlert('Only host can share screen!', 'error');
                return;
            }

            try {
                if (!isScreenSharing) {
                    const screenStream = await navigator.mediaDevices.getDisplayMedia({
                        video: true,
                        audio: true
                    });
                    localStream.getVideoTracks().forEach(track => {
                        track.stop();
                        localStream.removeTrack(track);
                    });
                    screenStream.getVideoTracks().forEach(track => {
                        localStream.addTrack(track);
                    });
                    localVideo.srcObject = localStream;
                    isScreenSharing = true;
                    document.getElementById('screenBtn').classList.add('active');
                    document.getElementById('screenBtn').innerHTML = '<i class="fas fa-desktop"></i> Screen';
                    showAlert('🖥️ Screen sharing started', 'success');

                    screenStream.getVideoTracks()[0].onended = () => {
                        toggleScreenShare();
                    };
                } else {
                    // Stop screen share, revert to camera
                    const cameraStream = await navigator.mediaDevices.getUserMedia({
                        video: true,
                        audio: true
                    });
                    localStream.getVideoTracks().forEach(track => {
                        track.stop();
                        localStream.removeTrack(track);
                    });
                    cameraStream.getVideoTracks().forEach(track => {
                        localStream.addTrack(track);
                    });
                    localVideo.srcObject = localStream;
                    isScreenSharing = false;
                    document.getElementById('screenBtn').classList.remove('active');
                    document.getElementById('screenBtn').innerHTML = '<i class="fas fa-desktop"></i> Screen';
                    showAlert('📷 Camera restored', 'info');
                }
            } catch (err) {
                console.error('Screen share error:', err);
                showAlert('Failed to share screen!', 'error');
            }
        }

        // ============================================================
        // END LIVE
        // ============================================================
        async function endLive() {
            if (!isHost) return;

            const confirmed = await showConfirm(
                'End Live?',
                'Are you sure you want to end the live stream? All viewers will be disconnected.',
                'Yes, End',
                'Cancel'
            );

            if (!confirmed) return;

            // Tell all viewers
            broadcastToAll({ type: 'host-ended' });

            // Clean up
            setRoomActive(currentRoom, false);
            leaveRoom();
            showAlert('✅ Live stream ended.', 'success');
            window.location.href = 'messages.html';
        }

        // ============================================================
        // LEAVE ROOM
        // ============================================================
        function leaveRoom() {
            isInRoom = false;
            isLeaving = true;

            if (localStream) {
                localStream.getTracks().forEach(track => track.stop());
                localStream = null;
            }
            if (remoteStream) {
                remoteStream.getTracks().forEach(track => track.stop());
                remoteStream = null;
            }

            for (const [peerId, conn] of Object.entries(connections)) {
                try { conn.close(); } catch (e) {}
            }
            connections = {};
            peers = {};
            viewerNames = {};

            if (peer) {
                try { peer.destroy(); } catch (e) {}
                peer = null;
            }

            if (signalChannel) {
                try { signalChannel.unsubscribe(); } catch (e) {}
                signalChannel = null;
            }

            if (window.announceInterval) {
                clearInterval(window.announceInterval);
                window.announceInterval = null;
            }

            liveRoom.style.display = 'none';
            lobby.style.display = 'flex';
            localVideo.style.display = 'none';
            remoteVideo.style.display = 'none';
            videoPlaceholder.style.display = 'flex';
            statusDot.className = 'dot';

            window.removeEventListener('beforeunload', handleBeforeUnload);
            backBtn.removeEventListener('click', handleBackClick);
        }

        // ============================================================
        // BACK BUTTON & BEFORE UNLOAD
        // ============================================================
        function handleBeforeUnload(e) {
            if (isInRoom && !isLeaving) {
                e.preventDefault();
                e.returnValue = '';
                return '';
            }
        }

        async function handleBackClick(e) {
            if (isInRoom && !isLeaving) {
                e.preventDefault();

                const confirmed = await showConfirm(
                    'Leave Stream?',
                    'Are you sure you want to leave?',
                    'Yes, Leave',
                    'Stay'
                );

                if (confirmed) {
                    if (isHost) {
                        setRoomActive(currentRoom, false);
                        broadcastToAll({ type: 'host-ended' });
                    }
                    leaveRoom();
                    window.location.href = 'messages.html';
                }
            } else {
                window.location.href = 'messages.html';
            }
        }

        // ============================================================
        // BROADCAST TO ALL
        // ============================================================
        function broadcastToAll(data) {
            const peersList = Object.values(peers);
            for (const conn of peersList) {
                try {
                    conn.send(data);
                } catch (err) {
                    console.error('Send error:', err);
                }
            }
        }

        // ============================================================
        // LOAD USER
        // ============================================================
        async function loadUser() {
            const userId = localStorage.getItem('userId');
            if (!userId) return;

            try {
                const supabase = getSupabase();
                if (!supabase) return;

                const { data, error } = await supabase
                    .from('users')
                    .select('username')
                    .eq('id', userId)
                    .single();

                if (!error && data) {
                    currentUser = { id: userId, username: data.username };
                    console.log('User loaded:', currentUser.username);
                }
            } catch (err) {
                console.error('Load user error:', err);
            }
        }

        // ============================================================
        // PAGE LOAD
        // ============================================================
        document.addEventListener('DOMContentLoaded', async function() {
            const userId = localStorage.getItem('userId');
            if (!userId) {
                window.location.href = 'login.html';
                return;
            }

            await loadUser();
            console.log('🚀 Private Live loaded!');
        });

        // Cleanup on unload
        window.addEventListener('unload', function() {
            if (isInRoom) {
                if (isHost) {
                    setRoomActive(currentRoom, false);
                }
                leaveRoom();
            }
        });
    </script>
</body>
</html>
