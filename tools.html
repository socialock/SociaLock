<head>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html,
        body {
            height: 100%;
        }
        body {
            background: #18191a;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            color: #e4e6eb;
            display: flex;
            flex-direction: column;
            padding-top: 0;
        }

        /* ===== BOTTOM NAVBAR ===== */
        .navbar-bottom {
            background: #242526;
            padding: 4px 8px;
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 999;
            border-bottom: 1px solid #3a3b3c;
            height: 46px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .nav-bottom-container {
            max-width: 600px;
            margin: 0 auto;
            display: flex;
            justify-content: space-around;
            align-items: center;
            width: 100%;
        }

        .nav-icon-bottom {
            font-size: 1.7rem;
            text-decoration: none;
            color: #b0b3b8;
            padding: 4px 16px;
            border-radius: 8px;
            transition: 0.3s;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1px;
        }
        .nav-icon-bottom:hover {
            background: #3a3b3c;
        }
        .nav-icon-bottom.active {
            color: #1877f2;
        }
        .nav-icon-bottom.active::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 20%;
            right: 20%;

            background: #1877f2;
            border-radius: 2px;

        .tools-header {
            display: flex;

            align-items: center;

        .tools-actions button {

            border: none;
            color: white;

            border-radius: 20px;

            gap: 0.3rem;

        }

        .tools-actions button:hover {
            background: #166fe5;

        }

        .search-tools {

            padding: 0.8rem 1rem;
            background: #3a3b3c;
            border: 1px solid #3a3b3c;
            color: #e4e6eb;
            border-radius: 30px;

        }

        }

        }

        .filter-bar {

            gap: 0.4rem;
            flex-wrap: wrap;
            margin-bottom: 0.8rem;
            padding: 0.5rem 0;
            border-bottom: 1px solid #3a3b3c;

            cursor: pointer;
            border: 1px solid transparent;

            color: #b0b3b8;
            white-space: nowrap;

        .filter-chip:hover {

            color: #e4e6eb;
        }

        .filter-chip.active {
            background: #1877f2;
            color: white;

        }

        .tools-list {
            display: flex;

            gap: 0.8rem;
            margin-top: 0.5rem;
        }

        .tool-item {
            background: #242526;
            padding: 0.8rem 1rem;
            border-radius: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            transition: 0.3s;
            border-left: 3px solid #1877f2;

        .tool-item:hover {

        }

        .tool-info {

        .tool-name {

            background: #3a3b3c;

        }

        .tool-actions {

            align-items: center;

            margin-left: 0.5rem;
        }

        .tool-share-btn {

            border: none;
            color: #b0b3b8;
            font-size: 1.2rem;

            font-size: 0.7rem;

            left: 0;

        .modal-box {

            border: 1px solid #3a3b3c;
            color: #e4e6eb;
            border-radius: 8px;
            font-size: 0.95rem;
            outline: none;
        }

        .modal-box input:focus,

            border-color: #1877f2;
        }
        .modal-box input::placeholder {
            color: #b0b3b8;
        }

        .modal-box .btn-row {
            display: flex;
            gap: 0.5rem;
        }

        .modal-box .btn-row button {
            flex: 1;
            padding: 0.6rem;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.9rem;
        }

        .btn-primary-modal {
            background: #1877f2;
            color: white;
        }

        .btn-primary-modal:hover {
            background: #166fe5;
        }

        .btn-danger-modal {
            background: #e94560;
            color: white;
        }

        .btn-danger-modal:hover {
            background: #ff4757;
        }

        .no-tools {
            text-align: center;
            padding: 2rem;
            color: #b0b3b8;
        }

        .loading-spinner {
            text-align: center;
            padding: 2rem;
            color: #b0b3b8;
        }

        .custom-alert {
            position: fixed;
            top: 70px;
            right: 10px;
            left: 10px;
            padding: 12px;
            border-radius: 8px;
            color: white;
            z-index: 10000;
            max-width: 400px;
            margin: 0 auto;
            animation: slideIn 0.3s ease;
        }
        .custom-alert.success {
            background: #4caf50;
        }
        .custom-alert.error {
            background: #e94560;
        }
        .custom-alert.info {
            background: #1877f2;
        }
        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        @media (max-width: 480px) {
            .navbar-bottom {
                height: 42px;
            }
            .nav-icon-bottom {
                font-size: 1.3rem;
                padding: 2px 8px;
            }
            .nav-icon-bottom .label {
                font-size: 0.5rem;
            }
            .main-wrapper {
                margin-top: 42px;
            }
            .main-container {
                padding: 0 10px;
            }
            .tools-header h2 {
                font-size: 1.1rem;
            }
            .tools-actions button {
                font-size: 0.7rem;
                padding: 0.3rem 0.6rem;
            }
            .filter-chip {
                font-size: 0.6rem;
                padding: 0.2rem 0.6rem;
            }
            .tool-item {
                padding: 0.6rem 0.8rem;
            }
            .tool-name {
                font-size: 0.9rem;
            }
            .tools-ad-card a {
                font-size: 0.75rem;
            }
            .tools-ad-card img {
                width: 40px;
                height: 40px;
            }
            .my-tools-section .tools-list {
                padding: 0.3rem;
            }
        }

        @media (min-width: 481px) and (max-width: 768px) {
            .main-wrapper {
                margin-top: 46px;
            }
            .main-container {
                padding: 0 16px;
            }
        }
    </style>
</head>

    <script>
        // ============================================================
        // SUPABASE CONFIG
        // ============================================================
        const SUPABASE_URL = 'https://mjuowfrzvgnqrazqnunr.supabase.co';
        const SUPABASE_ANON_KEY =
            'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1qdW93ZnJ6dmducXJhenFudW5yIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAwNDY4MzgsImV4cCI6MjA5NTYyMjgzOH0.D9leYQRFsql9ONIsG4pPYdkQdWI_8SDL23wS8rlO7pk';

        let supabaseClient = null;

        function getSupabase() {
            if (!supabaseClient) {
                try {
                    if (typeof window.supabase !== 'undefined' && window.supabase.createClient) {
                        supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
                        console.log("✅ Supabase connected");
                    }
                } catch (e) {
                    console.error("❌ Supabase error:", e);
                }
            }
            return supabaseClient;
        }

        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function showAlert(msg, type) {
            type = type || 'info';
            const existing = document.querySelector('.custom-alert');
            if (existing) existing.remove();
            const alert = document.createElement('div');
            alert.className = 'custom-alert ' + type;
            alert.innerHTML = msg +
                '<button onclick="this.parentElement.remove()" style="background:none;border:none;color:white;margin-left:10px;cursor:pointer;font-size:18px;">✕</button>';
            document.body.appendChild(alert);
            setTimeout(() => alert.remove(), 4000);
        }

        function isValidUrl(string) {
            try {
                const url = new URL(string);
                return url.protocol === 'http:' || url.protocol === 'https:';
            } catch (_) {
                return false;
            }
        }

        // ============================================================
        // TOOLS PAGE LOGIC
        // ============================================================
        let currentUser = null;
        let allTools = [];
        let myTools = [];
        let currentFilter = 'all';
        let searchQuery = '';

        const myToolsListEl = document.getElementById('myToolsList');

        // ============================================================
        // NOTIFICATION BADGE
        // ============================================================
        async function updateNotifBadge() {
            const badge = document.getElementById('notifBadge');
            if (!badge) return;

            const supabase = getSupabase();
            const userId = localStorage.getItem('userId');
            if (!supabase || !userId) {
                badge.classList.remove('show');
                return;
            }

            try {
                const { count, error } = await supabase
                    .from('notifications')
                    .select('*', { count: 'exact', head: true })
                    .eq('user_id', userId)
                    .eq('is_read', false);

                if (error) {
                    console.error('Badge count error:', error);
                    badge.classList.remove('show');
                    return;
                }

                const unreadCount = count || 0;
                const display = unreadCount > 9 ? '9+' : unreadCount;

                if (unreadCount > 0) {
                    badge.textContent = display;
                    badge.classList.add('show');
                } else {
                    badge.classList.remove('show');
                }

                localStorage.setItem('unreadNotificationCount', unreadCount);
                localStorage.setItem('totalUnreadCount', unreadCount);
                localStorage.setItem('totalUnreadDisplay', display);

            } catch (err) {
                console.error('Badge update error:', err);
                badge.classList.remove('show');
            }
        }

        // ============================================================
        // FETCH FUNCTIONS
        // ============================================================
        async function fetchToolsAds(country) {
            const supabase = getSupabase();
            if (!supabase) return [];
            try {
                const { data, error } = await supabase
                    .from('tools_ads')
                    .select('*')
                    .or(`target_country.eq.${country},target_country.eq.Global`)
                    .limit(30);
                if (error) return [];
                return data || [];
            } catch (err) {
                return [];
            }
        }

        async function fetchTools() {
            const supabase = getSupabase();
            if (!supabase) return [];
            try {
                const { data, error } = await supabase.from('tools').select('*').order('created_at', { ascending: false });
                if (error) return [];
                return data || [];
            } catch (err) {
                return [];
            }
        }

        async function fetchMyTools(userId) {
            const supabase = getSupabase();
            if (!supabase || !userId) return [];
            try {
                const { data, error } = await supabase.from('tools').select('*').eq('user_id', userId).order('created_at',
                    { ascending: false });
                if (error) return [];
                return data || [];
            } catch (err) {
                return [];
            }
        }

        async function publishTool(name, type, link) {
            const supabase = getSupabase();
            if (!supabase || !currentUser) return false;
            try {
                const { error } = await supabase.from('tools').insert({
                    user_id: currentUser.id,
                    name: name.trim(),
                    type: type,
                    link: link.trim(),
                    created_at: new Date().toISOString()
                });
                if (error) {
                    showAlert('Publish failed: ' + error.message, 'error');
                    return false;
                }
                return true;
            } catch (err) {
                showAlert('Publish failed!', 'error');
                return false;
            }
        }

        async function deleteTool(toolId) {
            const supabase = getSupabase();
            if (!supabase || !currentUser) return false;
            try {
                const { error } = await supabase.from('tools').delete().eq('id', toolId).eq('user_id', currentUser.id);
                if (error) {
                    showAlert('Delete failed: ' + error.message, 'error');
                    return false;
                }
                return true;
            } catch (err) {
                showAlert('Delete failed!', 'error');
                return false;
            }
        }

        // ============================================================
        // SHUFFLE ARRAY (Random)
        // ============================================================
        function shuffleArray(array) {
            const shuffled = [...array];
            for (let i = shuffled.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
            }
            return shuffled;
        }

        // ============================================================
        // SHARE FUNCTION - Native Android Share Sheet (Web Share API)
        // ============================================================
        function getToolShareUrl(toolId) {
            const baseUrl = window.location.origin + window.location.pathname.replace('tools.html', '');
            return `${baseUrl}tool.html?id=${toolId}`;
        }

        async function shareTool(toolId, event) {
            if (event) event.stopPropagation();

            const tool = allTools.find(t => t.id === toolId) || myTools.find(t => t.id === toolId);
            if (!tool) {
                showAlert('Tool not found!', 'error');
                return;
            }

            const shareUrl = getToolShareUrl(toolId);
            const shareData = {
                title: tool.name,
                text: `🔧 ${tool.name} - ${tool.type}`,
                url: shareUrl
            };

            if (navigator.share) {
                if (navigator.canShare && navigator.canShare(shareData)) {
                    try {
                        await navigator.share(shareData);
                        console.log('✅ Shared using Native Android Share Sheet');
                        return;
                    } catch (err) {
                        if (err.name === 'AbortError') {
                            console.log('User cancelled share');
                            return;
                        }
                        console.error('Share error:', err);
                    }
                } else {
                    try {
                        await navigator.share(shareData);
                        console.log('✅ Shared using Native Android Share Sheet');
                        return;
                    } catch (err) {
                        if (err.name === 'AbortError') {
                            console.log('User cancelled share');
                            return;
                        }
                        console.error('Share error:', err);
                    }
                }
            }

            try {
                await navigator.clipboard.writeText(shareUrl);
                showAlert('✅ Link copied to clipboard!', 'success');
            } catch (err) {
                const textArea = document.createElement('textarea');
                textArea.value = shareUrl;
                textArea.style.position = 'fixed';
                textArea.style.left = '-9999px';
                textArea.style.top = '-9999px';
                document.body.appendChild(textArea);
                textArea.select();
                try {
                    document.execCommand('copy');
                    showAlert('✅ Link copied to clipboard!', 'success');
                } catch (e) {
                    showAlert('Could not copy link. Please copy manually.', 'error');
                }
                document.body.removeChild(textArea);
            }
        }

        // ============================================================
        // RENDER FUNCTIONS
        // ============================================================
        function renderTools(tools, container, showDelete = false, append = false, isMyTools = false) {
            if (!append) container.innerHTML = '';
            if (!tools || tools.length === 0) {
                if (!append) {
                    if (isMyTools) {
                        container.innerHTML = `<div class="no-tools">You haven't published any tools yet</div>`;
                    } else {
                        container.innerHTML = `<div class="no-tools">🔧 No tools found</div>`;
                    }
                }
                return;
            }

            if (!showDelete && !append && !isMyTools && allToolsAds.length === 0) {
                loadToolsAdsRandomly();
            }

            tools.forEach((tool, index) => {
                const item = document.createElement('div');
                item.className = 'tool-item';
                item.setAttribute('data-id', tool.id);

                let domain = '';
                try {
                    if (tool.link) {
                        const url = new URL(tool.link);
                        domain = url.hostname;
                    }
                } catch (e) {}

                item.innerHTML = `
                        <div class="tool-info">
                            <div class="tool-name">${escapeHtml(tool.name)}</div>
                            <div style="display:flex; gap:0.5rem; align-items:center; flex-wrap:wrap;">
                                <span class="tool-type">${escapeHtml(tool.type)}</span>
                                ${domain ? `<span style="font-size:0.6rem; color:#b0b3b8;">${escapeHtml(domain)}</span>` : ''}
                            </div>
                        </div>
                        <div class="tool-actions">
                            <button class="tool-share-btn" onclick="shareTool('${tool.id}', event)" title="Share">
                                <i class="fas fa-share-alt"></i>
                            </button>
                            ${showDelete ? `<button class="tool-delete-btn" data-id="${tool.id}" title="Delete">🗑️</button>` : ''}
                        </div>
                    `;

                item.addEventListener('click', (e) => {
                    if (e.target.closest('.tool-share-btn') || e.target.closest('.tool-delete-btn')) return;
                    if (tool.link) window.open(tool.link, '_blank');
                    else showAlert('No link available!', 'error');
                });

                const deleteBtn = item.querySelector('.tool-delete-btn');
                if (deleteBtn) {
                    deleteBtn.addEventListener('click', async (e) => {
                        e.stopPropagation();
                        const id = deleteBtn.getAttribute('data-id');
                        if (confirm('Delete this tool?')) {
                            const success = await deleteTool(id);
                            if (success) {
                                showAlert('✅ Tool deleted!', 'success');
                                await refreshAll();
                            }
                        }
                    });
                }

                container.appendChild(item);

                if (!showDelete && !isMyTools && Math.random() < 0.15 && index < tools.length - 1) {
                    const ad = getRandomToolsAd();
                    if (ad) {
                        const adDiv = createToolsAdElement(ad);
                        container.appendChild(adDiv);
                    }
                }
            });
        }

        // ============================================================
        // TOOLS ADS - RANDOM (like home page)
        // ============================================================
        function getRandomToolsAd() {
            if (!allToolsAds || allToolsAds.length === 0) return null;
            const randomIndex = Math.floor(Math.random() * allToolsAds.length);
            return allToolsAds[randomIndex];
        }

        function createToolsAdElement(ad) {
            const adDiv = document.createElement('div');
            adDiv.className = 'tools-ad-card';
            const imgHtml = ad.image_url ?
                `<img src="${escapeHtml(ad.image_url)}" alt="${escapeHtml(ad.caption)}" loading="lazy" onerror="this.style.display='none'">` :
                '<span class="ad-emoji">📢</span>';
            adDiv.innerHTML = `
                    <a href="${escapeHtml(ad.link || '#')}" target="_blank" rel="noopener noreferrer">
                        ${imgHtml}
                        <span class="ad-caption">${escapeHtml(ad.caption || 'Advertisement')}</span>
                    </a>
                `;
            return adDiv;
        }

        async function loadToolsAdsRandomly(container) {
            try {
                const country = currentUser?.country || 'Bangladesh';
                allToolsAds = await fetchToolsAds(country);
            } catch (err) {
                console.error('Tools ads load error:', err);
            }
        }

        // ============================================================
        // PAGINATION
        // ============================================================
        function loadMoreTools() {
            if (isLoading || !hasMoreTools) return;
            const start = currentPage * TOOLS_PER_PAGE;
            const end = start + TOOLS_PER_PAGE;
            const nextBatch = filteredTools.slice(start, end);
            if (nextBatch.length === 0) {
                hasMoreTools = false;
                seeMoreBtn.textContent = 'No more tools';
                seeMoreBtn.disabled = true;
                return;
            }
            renderTools(nextBatch, toolsListEl, false, true, false);
            currentPage++;
            if (end >= filteredTools.length) {
                hasMoreTools = false;
                seeMoreBtn.textContent = 'No more tools';
                seeMoreBtn.disabled = true;
            } else {
                seeMoreBtn.textContent = `See More ↓ (${filteredTools.length - end} remaining)`;
                seeMoreBtn.disabled = false;
            }
        }

        // ============================================================
        // REFRESH & FILTER
        // ============================================================
        async function refreshAll() {
            if (isLoading) return;
            isLoading = true;
            try {
                if (!currentUser) {
                    toolsListEl.innerHTML = `<div class="no-tools">🔒 Please login</div>`;
                    return;
                }
                allTools = await fetchTools();
                myTools = await fetchMyTools(currentUser.id);
                await loadToolsAdsRandomly();
                applyFilters();
            } catch (err) {
                toolsListEl.innerHTML = `<div class="no-tools">❌ Failed to load tools</div>`;
            } finally {
                isLoading = false;
            }
        }

        function applyFilters() {
            currentPage = 0;
            hasMoreTools = true;
            seeMoreBtn.textContent = 'See More ↓';
            seeMoreBtn.disabled = false;

            let shuffledTools = shuffleArray(allTools);

            if (searchQuery.trim()) {
                const q = searchQuery.trim().toLowerCase();
                shuffledTools = shuffledTools.filter(t => t.name.toLowerCase().includes(q));
            }

            if (currentFilter !== 'all') {
                shuffledTools = shuffledTools.filter(t => t.type === currentFilter);
            }

            filteredTools = shuffledTools;

            if (showingMyTools) {
                myToolsSection.classList.add('show');

                let filteredMyTools = [...myTools];

                if (searchQuery.trim()) {
                    const q = searchQuery.trim().toLowerCase();
                    filteredMyTools = filteredMyTools.filter(t => t.name.toLowerCase().includes(q));
                }

                if (currentFilter !== 'all') {
                    filteredMyTools = filteredMyTools.filter(t => t.type === currentFilter);
                }

                renderTools(filteredMyTools, myToolsListEl, true, false, true);

                toolsListEl.style.display = 'none';
                seeMoreBtn.style.display = 'none';
            } else {
                myToolsSection.classList.remove('show');
                toolsListEl.style.display = 'flex';
                seeMoreBtn.style.display = 'block';

                const firstBatch = filteredTools.slice(0, TOOLS_PER_PAGE);
                renderTools(firstBatch, toolsListEl, false, false, false);
                currentPage = 1;

                if (filteredTools.length <= TOOLS_PER_PAGE) {
                    hasMoreTools = false;
                    seeMoreBtn.textContent = 'No more tools';
                    seeMoreBtn.disabled = true;
                } else {
                    hasMoreTools = true;
                    seeMoreBtn.textContent = `See More ↓ (${filteredTools.length - TOOLS_PER_PAGE} remaining)`;
                    seeMoreBtn.disabled = false;
                }
            }
        }

        // ============================================================
        // EVENT LISTENERS
        // ============================================================
        searchInput.addEventListener('input', (e) => {
            searchQuery = e.target.value;
            applyFilters();
        });

        filterBar.addEventListener('click', (e) => {
            const chip = e.target.closest('.filter-chip');
            if (!chip) return;
            document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
            chip.classList.add('active');
            currentFilter = chip.getAttribute('data-type');
            applyFilters();
        });

        myToolsToggleBtn.addEventListener('click', () => {
            showingMyTools = !showingMyTools;
            myToolsToggleBtn.textContent = showingMyTools ? '📁 All Tools' : '📁 My Tools';
            if (showingMyTools) {
                myToolsToggleBtn.style.background = '#4caf50';
            } else {
                myToolsToggleBtn.style.background = '#1877f2';
            }
            applyFilters();
        });

        seeMoreBtn.addEventListener('click', loadMoreTools);

        addToolBtn.addEventListener('click', () => {
            addModal.classList.add('open');
            toolNameInput.value = '';
            toolLinkInput.value = '';
            toolTypeSelect.value = 'Cyber Security';
            toolNameInput.focus();
        });

        closeAddModalBtn.addEventListener('click', () => addModal.classList.remove('open'));
        addModal.addEventListener('click', (e) => { if (e.target === addModal) addModal.classList.remove('open'); });
        document.addEventListener('keydown', (e) => { if (e.key === 'Escape' && addModal.classList.contains('open'))
                addModal.classList.remove('open'); });

        publishBtn.addEventListener('click', async () => {
            const name = toolNameInput.value.trim();
            const type = toolTypeSelect.value;
            const link = toolLinkInput.value.trim();
            if (!name) { showAlert('Please enter tool name!', 'error');
                toolNameInput.focus(); return; }
            if (name.length < 2) { showAlert('Name must be at least 2 characters!', 'error');
                toolNameInput.focus(); return; }
            if (!link) { showAlert('Please enter tool link!', 'error');
                toolLinkInput.focus(); return; }
            if (!isValidUrl(link)) { showAlert('Please enter a valid link (http/https)', 'error');
                toolLinkInput.focus(); return; }

            publishBtn.disabled = true;
            publishBtn.textContent = '⏳ Publishing...';
            const success = await publishTool(name, type, link);
            if (success) {
                showAlert('✅ Tool published!', 'success');
                addModal.classList.remove('open');
                await refreshAll();
                if (showingMyTools) {
                    applyFilters();
                }
            }
            publishBtn.disabled = false;
            publishBtn.textContent = '📤 Publish';
        });

        // ===== Profile Nav =====
        document.getElementById('profileNavBtn').addEventListener('click', function(e) {
            e.preventDefault();
            if (currentUser) {
                window.location.href = `userprofile.html?userId=${currentUser.id}`;
            }
        });

        // ============================================================
        // PAGE LOAD
        // ============================================================
        document.addEventListener('DOMContentLoaded', async () => {
            console.log('🔧 Tools page loading...');

            const userId = localStorage.getItem('userId');
            if (!userId) {
                window.location.href = 'login.html';
                return;
            }

            const supabase = getSupabase();
            if (!supabase) {
                showAlert('Supabase connection failed!', 'error');
                toolsListEl.innerHTML = `<div class="no-tools">❌ Supabase not connected</div>`;
                return;
            }

            try {
                const { data: user, error } = await supabase
                    .from('users')
                    .select('*')
                    .eq('id', userId)
                    .single();

                if (error || !user) {
                    showAlert('User not found!', 'error');
                    localStorage.removeItem('userId');
                    window.location.href = 'login.html';
                    return;
                }

                currentUser = user;
                console.log('✅ User loaded:', currentUser.username);
                await refreshAll();
                console.log('✅ Tools loaded successfully');

                // Badge আপডেট
                await updateNotifBadge();

                // প্রতি 30 সেকেন্ডে ব্যাজ আপডেট
                setInterval(updateNotifBadge, 30000);

            } catch (err) {
                console.error('Page load error:', err);
                showAlert('Failed to load page!', 'error');
                toolsListEl.innerHTML = `<div class="no-tools">❌ Load failed</div>`;
            }
        });

        console.log('🔧 Tools page loaded - Native share (phone popup) + Ads every 8 tools!');
    </script>
</body>
</html>
