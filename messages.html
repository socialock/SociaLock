<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Messages</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.0/dist/umd/supabase.min.js">
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html,
        body {
            height: 100%;
        }
        body {
            background: #18191a;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            color: #e4e6eb;
            display: flex;
            flex-direction: column;
            padding-top: 0;
        }

        /* ===== BOTTOM NAVBAR ===== */
        .navbar-bottom {
            background: #242526;
            padding: 4px 8px;
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 999;
            border-bottom: 1px solid #3a3b3c;
            height: 46px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .nav-bottom-container {
            max-width: 600px;
            margin: 0 auto;
            display: flex;
            justify-content: space-around;
            align-items: center;
            width: 100%;
        }

        .nav-icon-bottom {
            font-size: 1.7rem;
            text-decoration: none;
            color: #b0b3b8;
            padding: 4px 16px;
            border-radius: 8px;
            transition: 0.3s;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1px;
        }
        .nav-icon-bottom:hover {
            background: #3a3b3c;
        }
        .nav-icon-bottom.active {
            color: #1877f2;
        }
        .nav-icon-bottom.active::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 20%;
            right: 20%;
            height: 3px;
            background: #1877f2;
            border-radius: 2px;
        }
        .nav-icon-bottom .label {
            font-size: 0.6rem;
            font-weight: 500;
            color: #b0b3b8;
        }
        .nav-icon-bottom.active .label {
            color: #1877f2;
        }

        /* ===== NOTIFICATION BADGE ===== */
        .nav-icon-bottom {
            position: relative;
        }
        .notif-badge {
            position: absolute;
            top: -6px;
            right: -6px;
            background: #e94560;
            color: white;
            font-size: 10px;
            font-weight: 700;
            min-width: 18px;
            height: 18px;
            border-radius: 50%;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 0 5px;
            border: 2px solid #242526;
            line-height: 1;
            z-index: 5;
        }
        .notif-badge.show {
            display: flex;
        }

        .main-wrapper {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            margin-top: 46px;
        }
        .main-container {
            max-width: 700px;
            width: 100%;
            margin: 0 auto;
            padding: 0 16px;
            flex: 1;
            overflow-y: auto;
            padding-bottom: 20px;
        }

        .messages-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 0 12px;
            border-bottom: 1px solid #3a3b3c;
            margin-bottom: 16px;
        }
        .messages-header h1 {
            font-size: 1.3rem;
            color: #e4e6eb;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .messages-header h1 i {
            color: #1877f2;
        }

        .messages-options {
            display: flex;
            flex-direction: column;
            gap: 14px;
            margin-top: 8px;
        }

        .message-option-card {
            background: #242526;
            border-radius: 16px;
            padding: 20px 24px;
            border: 1px solid #3a3b3c;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            align-items: center;
            gap: 18px;
        }
        .message-option-card:hover {
            background: #2a2b2c;
            border-color: #4a4b4c;
            transform: scale(1.01);
        }
        .message-option-card:active {
            transform: scale(0.98);
        }

        .message-option-icon {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 26px;
            flex-shrink: 0;
        }
        .message-option-icon.p2p {
            background: #1877f2;
            color: white;
        }
        .message-option-icon.live {
            background: #e94560;
            color: white;
        }

        .message-option-info {
            flex: 1;
        }
        .message-option-info h3 {
            font-size: 17px;
            color: #e4e6eb;
            margin-bottom: 2px;
        }
        .message-option-info p {
            font-size: 13px;
            color: #b0b3b8;
            margin: 0;
        }
        .message-option-info .badge {
            display: inline-block;
            background: #1877f2;
            color: white;
            font-size: 10px;
            padding: 2px 10px;
            border-radius: 12px;
            font-weight: 600;
            margin-left: 8px;
        }
        .message-option-info .badge.live-badge {
            background: #e94560;
        }

        .message-option-arrow {
            color: #b0b3b8;
            font-size: 18px;
        }

        @media (max-width: 480px) {
            .navbar-bottom {
                height: 42px;
            }
            .nav-icon-bottom {
                font-size: 1.3rem;
                padding: 2px 8px;
            }
            .nav-icon-bottom .label {
                font-size: 0.5rem;
            }
            .main-wrapper {
                margin-top: 42px;
            }
            .main-container {
                padding: 0 10px;
            }
            .message-option-card {
                padding: 16px 18px;
            }
            .message-option-icon {
                width: 46px;
                height: 46px;
                font-size: 20px;
            }
            .message-option-info h3 {
                font-size: 15px;
            }
            .message-option-info p {
                font-size: 12px;
            }
            .messages-header h1 {
                font-size: 1.1rem;
            }
        }
    </style>
</head>

<body class="dark-theme">
    <!-- ===== BOTTOM NAVBAR ===== -->
    <nav class="navbar-bottom">
        <div class="nav-bottom-container">
            <a href="home.html" class="nav-icon-bottom" title="Home">
                <i class="fas fa-home"></i>
                <span class="label">Home</span>
            </a>
            <a href="messages.html" class="nav-icon-bottom active" title="Messages">
                <i class="fas fa-comment-dots"></i>
                <span class="label">Messages</span>
            </a>
            <a href="tools.html" class="nav-icon-bottom" title="Tools">
                <i class="fas fa-tools"></i>
                <span class="label">Tools</span>
            </a>
            <a href="notifications.html" class="nav-icon-bottom" title="Notifications">
                <i class="fas fa-bell"></i>
                <span class="label">Notifications</span>
                <span class="notif-badge" id="notifBadge">0</span>
            </a>
            <a href="#" class="nav-icon-bottom" id="profileNavBtn" title="Profile">
                <i class="fas fa-user-circle"></i>
                <span class="label">Profile</span>
            </a>
        </div>
    </nav>

    <!-- ===== MAIN CONTENT ===== -->
    <div class="main-wrapper">
        <div class="main-container">
            <div class="messages-header">
                <h1><i class="fas fa-comment-dots"></i> Messages</h1>
                <span style="font-size:13px;color:#b0b3b8;">
                    <i class="fas fa-lock" style="color:#1877f2;"></i> Secure
                </span>
            </div>

            <!-- ===== TWO OPTIONS ===== -->
            <div class="messages-options">
                <!-- Option 1: P2P Chat (Encrypted) -->
                <div class="message-option-card" onclick="window.location.href='p2pchat.html'">
                    <div class="message-option-icon p2p">
                        <i class="fas fa-lock"></i>
                    </div>
                    <div class="message-option-info">
                        <h3>
                            P2P Chat
                            <span class="badge">Encrypted</span>
                        </h3>
                        <p>🔒 Private &amp; secure peer-to-peer messaging with end-to-end encryption</p>
                    </div>
                    <div class="message-option-arrow">
                        <i class="fas fa-chevron-right"></i>
                    </div>
                </div>

                <!-- Option 2: Private Live -->
                <div class="message-option-card" onclick="window.location.href='plive.html'">
                    <div class="message-option-icon live">
                        <i class="fas fa-broadcast-tower"></i>
                    </div>
                    <div class="message-option-info">
                        <h3>
                            Private Live
                            <span class="badge live-badge">Live</span>
                        </h3>
                        <p>📡 Go live privately with your followers — real-time streaming</p>
                    </div>
                    <div class="message-option-arrow">
                        <i class="fas fa-chevron-right"></i>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ============================================================
        // SUPABASE CONFIG
        // ============================================================
        const SUPABASE_URL = 'https://mjuowfrzvgnqrazqnunr.supabase.co';
        const SUPABASE_ANON_KEY =
            'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1qdW93ZnJ6dmducXJhenFudW5yIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAwNDY4MzgsImV4cCI6MjA5NTYyMjgzOH0.D9leYQRFsql9ONIsG4pPYdkQdWI_8SDL23wS8rlO7pk';

        let supabaseClient = null;

        function getSupabase() {
            if (!supabaseClient) {
                try {
                    if (typeof window.supabase !== 'undefined' && window.supabase.createClient) {
                        supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
                        console.log("✅ Supabase connected");
                    }
                } catch (e) {
                    console.error("❌ Supabase error:", e);
                }
            }
            return supabaseClient;
        }

        // ============================================================
        // UPDATE NOTIFICATION BADGE
        // ============================================================
        async function updateNotifBadge() {
            const badge = document.getElementById('notifBadge');
            if (!badge) return;

            const supabase = getSupabase();
            const userId = localStorage.getItem('userId');
            if (!supabase || !userId) {
                badge.classList.remove('show');
                return;
            }

            try {
                const { count, error } = await supabase
                    .from('notifications')
                    .select('*', { count: 'exact', head: true })
                    .eq('user_id', userId)
                    .eq('is_read', false);

                if (error) {
                    console.error('Badge count error:', error);
                    badge.classList.remove('show');
                    return;
                }

                const unreadCount = count || 0;
                const display = unreadCount > 9 ? '9+' : unreadCount;

                if (unreadCount > 0) {
                    badge.textContent = display;
                    badge.classList.add('show');
                } else {
                    badge.classList.remove('show');
                }

                localStorage.setItem('unreadNotificationCount', unreadCount);

            } catch (err) {
                console.error('Badge update error:', err);
                badge.classList.remove('show');
            }
        }

        // ============================================================
        // PAGE LOAD
        // ============================================================
        document.addEventListener('DOMContentLoaded', function() {
            const userId = localStorage.getItem('userId');
            if (!userId) {
                window.location.href = 'login.html';
                return;
            }

            // Update badge
            updateNotifBadge();

            // Profile nav
            document.getElementById('profileNavBtn').addEventListener('click', function(e) {
                e.preventDefault();
                window.location.href = `userprofile.html?userId=${userId}`;
            });

            // Periodic badge update (every 30 seconds)
            setInterval(updateNotifBadge, 30000);

            console.log('🚀 Messages page loaded with P2P Chat & Private Live options!');
        });
    </script>
</body>
</html>
